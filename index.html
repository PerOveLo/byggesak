/* ---------------- Deling (dyplenker) ---------------- */
function miniToast(txt) {
  const t = document.createElement("div");
  t.className = "toast";
  t.innerHTML = `<span class="emoji">🔗</span><div><div class="t-title">${esc(txt)}</div></div>`;
  document.getElementById("toasts").appendChild(t);
  setTimeout(() => t.remove(), 3500);
}
async function shareLink(hash, title) {
  const url = location.origin + location.pathname + "#" + hash;
  if (navigator.share) {
    try { await navigator.share({ title: title || "Byggesaker Kristiansand", url }); return; }
    catch (e) { if (e.name === "AbortError") return; }
  }
  try {
    await navigator.clipboard.writeText(url);
    miniToast("Lenke kopiert – lim inn hvor som helst");
  } catch {
    prompt("Kopier lenken:", url);
  }
}
function setPanelShare(hash, title) {
  const b = document.getElementById("panelShare");
  if (!hash) { b.style.display = "none"; return; }
  b.style.display = "flex";
  b.onclick = () => shareLink(hash, title);
}
function handleDeepLink() {
  const raw = location.hash.slice(1);
  if (!raw) return;
  const h = decodeURIComponent(raw);
  if (h.startsWith("sak=")) {
    const nr = h.slice(4);
    const c = DATA.cases.find(x => x.casenr === nr);
    if (c) setTimeout(() => focusCase(c), 500);
  } else if (h.startsWith("adresse=")) {
    const rest = h.slice(8);
    const [label, geo] = rest.split("@");
    const p = POIS.find(x => addrKey(x.label) === addrKey(label));
    if (geo) {
      const [lat, lng, z] = geo.split(",").map(Number);
      if (isFinite(lat) && isFinite(lng)) map.setView([lat, lng], isFinite(z) ? z : 17);
    } else if (p) {
      map.setView(p.latlon, 17);
    }
    if (p) setTimeout(() => openPoi(p), 400);
  }
}

/* ---------------- Varsler (toasts) ---------------- */
function showToasts() {
  const ups = followUpdates();
  refreshBadges();
  const box = document.getElementById("toasts");
  for (const u of ups.slice(0, 4)) {
    const t = document.createElement("div");
    t.className = "toast";
    const sub = u.kind === "addr"
      ? (u.newCases ? `${u.newCases} ny(e) sak(er) på adressen` : "Ny aktivitet på adressen")
      : u.kind === "ent"
        ? (u.newCases ? `${u.newCases} ny(e) sak(er) fra ${u.entKind === "sb" ? "saksbehandleren" : "firmaet"}` : "Ny aktivitet")
        : `${u.newDocs ? u.newDocs + " nye dokumenter" : "Ny aktivitet"} · ${esc(u.c.casenr)}`;
    t.innerHTML = `<span class="emoji">🔔</span><div><div class="t-title">${esc(u.label)}</div>
      <div class="t-sub">${sub}</div></div><span class="t-x">✕</span>`;
    t.querySelector(".t-x").onclick = e => { e.stopPropagation(); t.remove(); };
    t.onclick = () => {
      t.remove();
      if (u.kind === "addr") flyToPoi(u.p);
      else if (u.kind === "ent") openEntity(u.entKind, u.label);
      else focusCase(u.c);
    };
    box.appendChild(t);
    setTimeout(() => t.remove(), 14000);
  }
  if (ups.length && "Notification" in window && Notification.permission === "granted" && document.hidden) {
    new Notification("Byggesaker Kristiansand", {
      body: ups.map(u => `${u.label}: ny aktivitet`).join("\n"),
    });
  }
}
function flyToPoi(p) {
  map.flyTo(p.latlon, Math.max(map.getZoom(), 16), { duration: 0.8 });
  setTimeout(() => openPoi(p), 850);
}
function focusCase(c) {
  if (!c.latlon) { openNogeo(); return; }
  const p = POIS.find(p => p.cases.includes(c));
  if (!p) return;
  map.flyTo(c.latlon, 17, { duration: 0.8 });
  setTimeout(() => {
    openPoi(p);
    const card = document.querySelector(`.case[data-nr="${CSS.escape(c.casenr)}"]`);
    if (card) { card.classList.add("open"); card.scrollIntoView({ behavior: "smooth", block: "start" }); }
  }, 850);
}

/* ---------------- Søk med forslag og kart-flytting ---------------- */
const suggest = document.getElementById("suggest");
let selIdx = -1;
function searchMatches(q) {
  q = q.toLowerCase().trim();
  if (q.length < 2) return [];
  const out = [];
  for (const p of POIS) {
    const l = p.label.toLowerCase();
    if (l.startsWith(q) || l.includes(" " + q)) out.push({ p, score: l.startsWith(q) ? 0 : 1 });
  }
  out.sort((a, b) => a.score - b.score || a.p.label.localeCompare(b.p.label));
  const res = out.slice(0, 5).map(o => ({ type: "addr", p: o.p, label: "📍 " + o.p.label, raw: o.p.label, sub: `${o.p.cases.length} sak(er)` }));

  // Firmaer og saksbehandlere
  const ents = new Map();
  for (const c of DATA.cases) {
    if (c.soker && c.soker.toLowerCase().includes(q)) {
      const k = "firma|" + c.soker;
      ents.set(k, (ents.get(k) || 0) + 1);
    }
    if (c.saksbehandler && c.saksbehandler.toLowerCase().includes(q)) {
      const k = "sb|" + c.saksbehandler;
      ents.set(k, (ents.get(k) || 0) + 1);
    }
  }
  [...ents.entries()].sort((a, b) => b[1] - a[1]).slice(0, 3).forEach(([k, n]) => {
    const [kind, name] = [k.slice(0, k.indexOf("|")), k.slice(k.indexOf("|") + 1)];
    res.push({ type: "ent", kind, name, label: (kind === "firma" ? "🏢 " : "👤 ") + name,
               sub: `${n} sak(er) som ${kind === "firma" ? "søker" : "saksbehandler"}` });
  });

  // Tiltakstyper («basseng», «garasje» …)
  const kats = new Map();
  for (const c of DATA.cases) for (const k of (c.kategorier || [])) {
    if (k.toLowerCase().includes(q)) kats.set(k, (kats.get(k) || 0) + 1);
  }
  [...kats.entries()].sort((a, b) => b[1] - a[1]).slice(0, 2).forEach(([k, n]) =>
    res.push({ type: "kat", name: k, label: "🏷 " + k, sub: `${n} saker – vis alle` }));

  const nr = DATA.cases.find(c => c.casenr.toLowerCase().includes(q) && c.latlon);
  if (nr) res.unshift({ type: "case", c: nr, label: nr.casenr, sub: nr.displayAddress || "" });
  return res.slice(0, 8);
}
function drawSuggest(items) {
  selIdx = -1;
  if (!items.length) { suggest.style.display = "none"; suggest.innerHTML = ""; return; }
  suggest.innerHTML = items.map((it, i) =>
    `<button data-i="${i}">${esc(it.label)} <span class="s-sub">${esc(it.sub)}</span></button>`).join("");
  suggest.style.display = "block";
  suggest.querySelectorAll("button").forEach(b => b.onclick = () => pickSuggest(items[parseInt(b.dataset.i, 10)]));
  suggest._items = items;
}
function pickSuggest(it) {
  suggest.style.display = "none";
  document.getElementById("q").value = it.raw || it.name || it.label;
  state.q = "";
  render();
  if (it.type === "addr") flyToPoi(it.p);
  else if (it.type === "ent") openEntity(it.kind, it.name);
  else if (it.type === "kat") openCaseList("Tiltakstype: " + it.name,
    "", DATA.cases.filter(c => (c.kategorier || []).includes(it.name)).sort(byActivity));
  else focusCase(it.c);
}
const qInput = document.getElementById("q");
const topbarEl = document.querySelector(".topbar");
const searchwrapEl = document.querySelector(".searchwrap");
function syncSearchUi() {
  searchwrapEl.classList.toggle("has-text", !!qInput.value);
  if (qInput.value || document.activeElement === qInput) topbarEl.classList.add("search-active");
}
let qT;
qInput.addEventListener("input", () => {
  syncSearchUi();
  clearTimeout(qT);
  qT = setTimeout(() => {
    state.q = qInput.value.toLowerCase().trim();
    render();
    drawSuggest(searchMatches(qInput.value));
  }, 160);
});
qInput.addEventListener("focus", syncSearchUi);
qInput.addEventListener("blur", () => {
  setTimeout(() => { if (!qInput.value) topbarEl.classList.remove("search-active"); }, 250);
});
document.getElementById("qClear").onclick = () => {
  qInput.value = "";
  state.q = "";
  syncSearchUi();
  drawSuggest([]);
  render();
  qInput.focus();
};
qInput.addEventListener("keydown", e => {
  const items = suggest._items || [];
  if (e.key === "ArrowDown" || e.key === "ArrowUp") {
    e.preventDefault();
    if (!items.length) return;
    selIdx = (selIdx + (e.key === "ArrowDown" ? 1 : -1) + items.length) % items.length;
    suggest.querySelectorAll("button").forEach((b, i) => b.classList.toggle("sel", i === selIdx));
  } else if (e.key === "Enter") {
    if (items.length) pickSuggest(items[Math.max(selIdx, 0)]);
  } else if (e.key === "Escape") {
    suggest.style.display = "none";
  }
});
document.addEventListener("click", e => { if (!e.target.closest(".searchwrap")) suggest.style.display = "none"; });

/* ---------------- PDF/bilde-viser ---------------- */
function proxyUrl(url) {
  if (CFG.pdfProxy) return CFG.pdfProxy + "?url=" + encodeURIComponent(url);
  if (IS_LOCAL) return "/pdfproxy?url=" + encodeURIComponent(url);
  return null;
}
let pdfjsReady = null;
function loadPdfJs() {
  if (pdfjsReady) return pdfjsReady;
  pdfjsReady = new Promise((res, rej) => {
    const s = document.createElement("script");
    s.src = "https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js";
    s.onload = () => {
      window.pdfjsLib.GlobalWorkerOptions.workerSrc = "https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.worker.min.js";
      res(window.pdfjsLib);
    };
    s.onerror = rej;
    document.head.appendChild(s);
  });
  return pdfjsReady;
}
function openFile(a) {
  const url = a.getAttribute("href");
  const name = a.dataset.name || "Dokument";
  if (!IS_HTTP || !proxyUrl(url)) { window.open(url, "_blank"); return false; }
  showViewer(url, name);
  return false;
}
async function showViewer(url, name) {
  const v = document.getElementById("viewer");
  const body = document.getElementById("viewerBody");
  document.getElementById("viewerTitle").textContent = name;
  document.getElementById("viewerExt").href = url;
  body.innerHTML = '<div id="viewerMsg">Laster dokument …</div>';
  v.classList.add("open");
  const proxied = proxyUrl(url);
  const isImg = /\.(jpe?g|png|gif|webp|bmp)(\?|$)/i.test(url);
  try {
    if (isImg) { body.innerHTML = `<img src="${esc(proxied)}" alt="${esc(name)}">`; return; }
    const pdfjs = await loadPdfJs();
    const pdf = await pdfjs.getDocument({ url: proxied }).promise;
    body.innerHTML = "";
    const width = Math.min(document.documentElement.clientWidth - 24, 900);
    for (let i = 1; i <= pdf.numPages; i++) {
      const page = await pdf.getPage(i);
      const base = page.getViewport({ scale: 1 });
      const scale = width / base.width;
      const vp = page.getViewport({ scale: scale * (window.devicePixelRatio || 1) });
      const canvas = document.createElement("canvas");
      canvas.width = vp.width; canvas.height = vp.height;
      canvas.style.width = width + "px";
      body.appendChild(canvas);
      await page.render({ canvasContext: canvas.getContext("2d"), viewport: vp }).promise;
    }
  } catch (err) {
    body.innerHTML = `<div id="viewerMsg">Kunne ikke vise dokumentet her (${esc(String(err.message || err))}).<br><br>
      <a href="${esc(url)}" target="_blank" rel="noopener" style="color:#6db2ff">Åpne i egen fane i stedet ↗</a></div>`;
  }
}
function closeViewer() {
  document.getElementById("viewer").classList.remove("open");
  document.getElementById("viewerBody").innerHTML = "";
}
document.addEventListener("keydown", e => { if (e.key === "Escape") closeViewer(); });

/* ---------------- Bunnark-drag (mobil) ---------------- */
(function () {
  const head = document.getElementById("panelHead");
  const grip = document.getElementById("grip");
  let startY = 0, startH = 0, dragging = false, moved = false;
  let activePointers = 0;
  const down = e => {
    activePointers++;
    if (activePointers > 1) { dragging = false; return; }
    if (e.target.closest("button, select, input, a")) return;
    dragging = true; moved = false; startY = e.clientY;
    startH = window.innerHeight - panel.getBoundingClientRect().top;
    e.currentTarget.setPointerCapture(e.pointerId);
    panel.style.transition = "none";
  };
  const move = e => {
    if (!dragging) return;
    if (Math.abs(e.clientY - startY) > 6) moved = true;
    if (!moved) return;
    const h = Math.min(Math.max(startH + (startY - e.clientY), 90), window.innerHeight * 0.92);
    panel.style.setProperty("--sheet", (h / window.innerHeight * 100) + "dvh");
  };
  const up = () => {
    activePointers = Math.max(0, activePointers - 1);
    if (!dragging) return;
    dragging = false;
    panel.style.transition = "";
    if (!moved) return;
    const frac = (window.innerHeight - panel.getBoundingClientRect().top) / window.innerHeight;
    if (frac < 0.22) closePanel();
    else if (frac < 0.55) panel.style.setProperty("--sheet", "55dvh");
    else panel.style.setProperty("--sheet", "92dvh");
  };
  for (const el of [head, grip]) {
    el.addEventListener("pointerdown", down);
    el.addEventListener("pointermove", move);
    el.addEventListener("pointerup", up);
    el.addEventListener("pointercancel", up);
  }
  // Scroller man i innholdet mens arket er halvåpent, løftes det til fullskjerm
  const pBody = document.getElementById("panelBody");
  pBody.addEventListener("scroll", function () {
    if (!IS_MOBILE_MQ.matches) return;
    const frac = (window.innerHeight - panel.getBoundingClientRect().top) / window.innerHeight;
    if (frac < 0.8 && this.scrollTop > 25) panel.style.setProperty("--sheet", "92dvh");
  }, { passive: true });

  // Sveip hvor som helst i innholdet (ikke på skjema-felt): opp = maksimer, ned fra toppen = minimer/lukk
  let tY = null, tX = null, tScroll = 0, tHandled = false, tInteractive = false;
  pBody.addEventListener("touchstart", e => {
    if (e.touches.length > 1) { tY = null; tHandled = true; return; }  // knip = aldri sveip
    tY = e.touches[0].clientY;
    tX = e.touches[0].clientX;
    tScroll = pBody.scrollTop;
    tHandled = false;
    tInteractive = !!e.target.closest("textarea, select, input");
  }, { passive: true });
  pBody.addEventListener("touchmove", e => {
    if (e.touches.length > 1) { tY = null; tHandled = true; return; }  // ble til knip underveis
    if (!IS_MOBILE_MQ.matches || tY === null || tHandled || tInteractive) return;
    const dy = e.touches[0].clientY - tY;
    const dx = e.touches[0].clientX - tX;
    if (Math.abs(dx) > Math.abs(dy)) return;            // sidelengs bevegelse = ikke sveip
    const frac = (window.innerHeight - panel.getBoundingClientRect().top) / window.innerHeight;
    if (dy < -26 && frac < 0.85) {                      // sveip opp -> fullskjerm
      panel.style.setProperty("--sheet", "92dvh");
      tHandled = true;
    } else if (dy > 48 && tScroll <= 2 && pBody.scrollTop <= 2) {  // sveip ned fra toppen (roligere terskel)
      if (frac > 0.72) panel.style.setProperty("--sheet", "55dvh");
      else closePanel();
      tHandled = true;
    }
  }, { passive: true });
  pBody.addEventListener("touchend", () => { tY = null; }, { passive: true });
})();

/* ---------------- Automatisk datalast ---------------- */
async function refreshData() {
  if (!IS_HTTP) return;
  try {
    const r = await fetch("data/index.json", { cache: "no-store" });
    if (!r.ok) return;
    const fresh = await r.json();
    if (fresh.updated !== DATA.updated) {
      applyIndex(fresh);
      render();
      showToasts();
    }
  } catch { /* offline er greit */ }
}
function applyIndex(idx) {
  DATA = { updated: idx.updated, updatedLocal: idx.updatedLocal,
           poiSummaries: idx.poiSummaries || {}, cases: (idx.cases || []).map(inflate) };
  for (const k of Object.keys(CHUNKS)) delete CHUNKS[k];
  POIS = buildPois();
  NOGEO = DATA.cases.filter(c => !c.latlon);
}
setInterval(refreshData, 5 * 60 * 1000);
document.addEventListener("visibilitychange", () => { if (!document.hidden) refreshData(); });
