let LIST_CTX = null;
function openCaseList(title, sub, cases) { navOpen("list:" + title, () => renderCaseList(title, sub, cases)); }
function renderCaseList(title, sub, cases) {
  LIST_CTX = { cases, shown: 0 };
  openPanel(title, `${cases.length} sak${cases.length === 1 ? "" : "er"}${sub ? " · " + sub : ""}`,
    `<div id="caseList"></div><div class="listnote"><button class="btn sec" id="moreBtn">Vis flere</button></div>`);
  document.getElementById("moreBtn").onclick = listShowMore;
  listShowMore();
}
function listShowMore() {
  if (!LIST_CTX) return;
  const el = document.getElementById("caseList");
  const next = LIST_CTX.cases.slice(LIST_CTX.shown, LIST_CTX.shown + 50);
  el.insertAdjacentHTML("beforeend", next.map(caseCard).join(""));
  LIST_CTX.shown += next.length;
  const btn = document.getElementById("moreBtn");
  if (btn) btn.style.display = LIST_CTX.shown >= LIST_CTX.cases.length ? "none" : "";
  wireCards();
}
function effDate(c) { return c.lastDate || c.firstDate || String(caseYear(c) || ""); }
function caseRecency(c) { const m = /^[A-ZÆØÅ]+-(\d{2})\/(\d+)/.exec(c.casenr); return m ? (+m[1]) * 100000 + (+m[2]) : 0; }
const byActivity = (a, b) => effDate(b).localeCompare(effDate(a)) || (caseRecency(b) - caseRecency(a));

/* ---------------- Statistikk ---------------- */
function median(arr) {
  if (!arr.length) return null;
  const s = [...arr].sort((a, b) => a - b);
  const m = Math.floor(s.length / 2);
  return s.length % 2 ? s[m] : Math.round((s[m - 1] + s[m]) / 2);
}
function barList(rows, color) {
  const max = Math.max(...rows.map(r => r.v), 1);
  return `<div class="bars">` + rows.map(r => `
    <div class="barrow" title="${esc(r.k)}: ${r.v}">
      <div class="b-lbl">${esc(r.k)}</div>
      <div class="b-track"><div class="b-fill" style="width:${Math.round(r.v / max * 100)}%;background:${r.c || color}"></div></div>
      <div class="b-val">${r.v}</div>
    </div>`).join("") + `</div>`;
}
function openStats() { fireEvent("side", "statistikk"); navOpen("statistikk", renderStats); }
function renderStats() {
  const now = new Date();
  const yr = now.getFullYear();
  const cutoff12 = new Date(now - 365 * 864e5).toISOString().slice(0, 10);
  const cs = DATA.cases;

  const last12 = cs.filter(c => (c.firstDate || "") >= cutoff12);
  const decided = cs.filter(c => /tillatelse gitt|rammetillatelse|igangsetting|avslag|ferdigattest/i.test(c.status || ""));
  const granted = decided.filter(c => !/avslag/i.test(c.status)).length;
  const rejected = decided.length - granted;
  const durations = cs.filter(c => c.firstDate && c.lastDate && /ferdigattest|tillatelse gitt|avslag|avsluttet/i.test(c.status || ""))
    .map(c => Math.round((new Date(c.lastDate) - new Date(c.firstDate)) / 864e5)).filter(d => d >= 0);
  const aktiveUlov = cs.filter(c => c.type === "Ulovlighetssak" && !/avsluttet|trukket|avvist/i.test(c.status || "")).length;

  const perYear = [];
  for (let y = yr - 7; y <= yr; y++) {
    const n = cs.filter(c => caseYear(c) === y).length;
    perYear.push({ k: String(y), v: n });
  }
  const perType = TYPES.map(t => ({ k: t, v: cs.filter(c => c.type === t).length, c: COLORS[t] }));
  const streetCount = {};
  for (const c of cs) {
    if ((c.lastDate || "") < cutoff12) continue;
    const street = (c.displayAddress || "").replace(/\s+\d+[A-Za-zæøå]?$/, "").trim();
    if (street) streetCount[street] = (streetCount[street] || 0) + 1;
  }
  const topStreets = Object.entries(streetCount).sort((a, b) => b[1] - a[1]).slice(0, 8)
    .map(([k, v]) => ({ k, v }));
  const statusCount = {};
  for (const c of cs) statusCount[c.status || "?"] = (statusCount[c.status || "?"] || 0) + 1;
  const topStatus = Object.entries(statusCount).sort((a, b) => b[1] - a[1]).slice(0, 7)
    .map(([k, v]) => ({ k, v }));
  const katCount = {};
  for (const c of cs) for (const k of (c.kategorier || [])) katCount[k] = (katCount[k] || 0) + 1;
  const topKat = Object.entries(katCount).sort((a, b) => b[1] - a[1]).slice(0, 10).map(([k, v]) => ({ k, v }));
  const firmCount = {}, sbCount = {};
  for (const c of cs) {
    const f = caseSoker(c);
    if (f) firmCount[f] = (firmCount[f] || 0) + 1;
    if (c.saksbehandler) sbCount[c.saksbehandler] = (sbCount[c.saksbehandler] || 0) + 1;
  }
  const topFirms = Object.entries(firmCount).sort((a, b) => b[1] - a[1]).slice(0, 8).map(([k, v]) => ({ k, v }));
  const topSb = Object.entries(sbCount).sort((a, b) => b[1] - a[1]).slice(0, 8).map(([k, v]) => ({ k, v }));

  // Behandlingstid: avgjorte saker med journaldatoer, målt første→siste dokument
  const behSaker = cs.filter(c => c.firstDate && c.lastDate && /ferdigattest|tillatelse gitt|avslag|avsluttet/i.test(c.status || ""));
  const behDager = c => Math.round((new Date(c.lastDate) - new Date(c.firstDate)) / 864e5);
  const behPerKat = {};
  for (const c of behSaker) {
    const d = behDager(c);
    if (d < 0) continue;
    for (const k of (c.kategorier || [])) (behPerKat[k] = behPerKat[k] || []).push(d);
  }
  const behKat = Object.entries(behPerKat).filter(([, v]) => v.length >= 10)
    .map(([k, v]) => ({ k, v: median(v) })).sort((a, b) => b.v - a.v).slice(0, 10);
  const behAar = [];
  for (let y = yr - 5; y <= yr; y++) {
    const ds = behSaker.filter(c => +c.firstDate.slice(0, 4) === y).map(behDager).filter(d => d >= 0);
    if (ds.length >= 5) behAar.push({ k: String(y), v: median(ds) });
  }

  const html = `
    <div class="kpis">
      <div class="kpi" data-kpi="nye12" style="cursor:pointer"><div class="k-val">${last12.length}</div><div class="k-lbl">nye saker siste 12 måneder</div></div>
      <div class="kpi" data-kpi="varighet" style="cursor:pointer"><div class="k-val">${median(durations) ?? "–"}</div><div class="k-lbl">median dager fra første til siste dokument (avgjorte saker)</div></div>
      <div class="kpi" data-kpi="avslag" style="cursor:pointer"><div class="k-val">${decided.length ? Math.round(granted / decided.length * 100) + "%" : "–"}</div><div class="k-lbl">innvilget av avgjorte søknader (${granted} av ${decided.length}, ${rejected} avslag – klikk for avslagene)</div></div>
      <div class="kpi" data-kpi="ulov" style="cursor:pointer"><div class="k-val">${aktiveUlov}</div><div class="k-lbl">åpne ulovlighetssaker</div></div>
    </div>
    <div class="listnote">Alt er klikkbart – trykk på et tall eller en rad for å se sakene bak.</div>
    <div class="sectionlabel">Saker per år</div><div data-list="år">${barList(perYear, "#0a84ff")}</div>
    <div class="sectionlabel">Sakstyper (alle år)</div><div data-list="type">${barList(perType)}</div>
    <div class="sectionlabel">Tiltakstyper (alle år)</div><div data-list="kat">${topKat.length ? barList(topKat, "#ff9f0a") : '<div class="listnote">Klassifisering kjøres etter datainnhentingen.</div>'}</div>
    <div class="sectionlabel">⏱ Behandlingstid per tiltakstype (median dager, tregest øverst)</div>
    <div data-list="behkat">${behKat.length ? barList(behKat, "#ff453a") : '<div class="listnote">For få daterte avgjorte saker ennå.</div>'}</div>
    <div class="sectionlabel">⏱ Behandlingstid etter startår (median dager)</div>
    <div data-list="behår">${behAar.length ? barList(behAar, "#ff9f0a") : '<div class="listnote">For få daterte avgjorte saker ennå.</div>'}</div>
    <div class="listnote" style="text-align:left;padding-top:2px">Målt fra første til siste journalførte dokument i avgjorte saker. De nyeste årgangene er kunstig lave – der er det foreløpig bare de raskeste sakene som har rukket å bli avgjort.</div>
    <div class="sectionlabel">Mest aktive gater siste 12 mnd</div><div data-list="gate">${topStreets.length ? barList(topStreets, "#0a84ff") : '<div class="listnote">Ingen data ennå.</div>'}</div>
    <div class="sectionlabel">Mest aktive søkerfirma</div>
    <div data-entlist="firma">${topFirms.length ? barList(topFirms, "#bf5af2") : '<div class="listnote">Ingen firmadata funnet.</div>'}</div>
    <div class="sectionlabel">Saksbehandlere med flest saker</div>
    <div data-entlist="sb">${topSb.length ? barList(topSb, "#30d158") : '<div class="listnote">Ingen data.</div>'}</div>
    <div class="sectionlabel">Statusfordeling</div><div data-list="status">${barList(topStatus, "#8e8e93")}</div>
    <div class="listnote">Basert på ${cs.length} saker fra kommunens innsynsløsning. Datoer = journalført dato.</div>`;
  openPanel("Statistikk", "Alle saker i kartet – Kristiansand", html);

  const lists = {
    "år": lbl => [`Saker i ${lbl}`, cs.filter(c => String(caseYear(c)) === lbl)],
    "type": lbl => [lbl, cs.filter(c => c.type === lbl)],
    "kat": lbl => [`Tiltakstype: ${lbl}`, cs.filter(c => (c.kategorier || []).includes(lbl))],
    "gate": lbl => [`${lbl} – aktivitet siste 12 mnd`, cs.filter(c =>
      (c.lastDate || "") >= cutoff12 && (c.displayAddress || "").replace(/\s+\d+[A-Za-zæøå]?$/, "").trim() === lbl)],
    "status": lbl => [`Status: ${lbl}`, cs.filter(c => c.status === lbl)],
    "behkat": lbl => [`Avgjorte saker: ${lbl}`, behSaker.filter(c => (c.kategorier || []).includes(lbl))],
    "behår": lbl => [`Avgjorte saker startet i ${lbl}`, behSaker.filter(c => c.firstDate.slice(0, 4) === lbl)],
  };
  document.querySelectorAll('#panelBody [data-list]').forEach(box => {
    const kind = box.dataset.list;
    box.querySelectorAll(".barrow").forEach(r => {
      r.style.cursor = "pointer";
      r.addEventListener("click", () => {
        const [title, cases] = lists[kind](r.querySelector(".b-lbl").textContent);
        openCaseList(title, "", cases.sort(byActivity));
      });
    });
  });
  document.querySelectorAll('#panelBody [data-entlist]').forEach(box => {
    const kind = box.dataset.entlist;
    box.querySelectorAll(".barrow").forEach(r => {
      r.style.cursor = "pointer";
      r.addEventListener("click", () => openEntity(kind, r.querySelector(".b-lbl").textContent));
    });
  });
  document.querySelectorAll('#panelBody [data-kpi]').forEach(k => {
    k.addEventListener("click", () => {
      const kind = k.dataset.kpi;
      if (kind === "nye12") openCaseList("Nye saker siste 12 måneder", "", [...last12].sort(byActivity));
      else if (kind === "varighet") openCaseList("Avgjorte saker med datoer", "grunnlaget for median-tallet",
        cs.filter(c => c.firstDate && c.lastDate && /ferdigattest|tillatelse gitt|avslag|avsluttet/i.test(c.status || "")).sort(byActivity));
      else if (kind === "avslag") openCaseList("Avslag", "", cs.filter(c => /avslag/i.test(c.status || "")).sort(byActivity));
      else if (kind === "ulov") openCaseList("Åpne ulovlighetssaker", "",
        cs.filter(c => c.type === "Ulovlighetssak" && !/avsluttet|trukket|avvist/i.test(c.status || "")).sort(byActivity));
    });
  });
}

async function shareLink(hash, title) {
  const url = location.origin + location.pathname + "#" + hash;
  if (navigator.share) {
    try { await navigator.share({ title: title || "Byggesaker Kristiansand", url }); return; }
    catch (e) { if (e.name === "AbortError") return; }
  }
  try {
    await navigator.clipboard.writeText(url);
    miniToast("Lenke kopiert – lim inn hvor som helst");
  } catch {
    prompt("Kopier lenken:", url);
  }
}

  if (!hash) { b.style.display = "none"; return; }
  b.style.display = "flex";
  b.onclick = () => shareLink(hash, title);
}
function handleDeepLink() {
  const raw = location.hash.slice(1);
  if (!raw) return;
  const h = decodeURIComponent(raw);
  if (h.startsWith("sak=")) {
    const nr = h.slice(4);
    const c = DATA.cases.find(x => x.casenr === nr);
    if (c) setTimeout(() => focusCase(c), 500);
  } else if (h.startsWith("adresse=")) {
    const rest = h.slice(8);
    const [label, geo] = rest.split("@");
    const p = POIS.find(x => addrKey(x.label) === addrKey(label));
    if (geo) {
      const [lat, lng, z] = geo.split(",").map(Number);
      if (isFinite(lat) && isFinite(lng)) map.setView([lat, lng], isFinite(z) ? z : 17);
    } else if (p) {
      map.setView(p.latlon, 17);
    }
    if (p) setTimeout(() => openPoi(p), 400);
  }
}

const suggest = document.getElementById("suggest");
let selIdx = -1;
/* Alle offisielle adresser i Kristiansand (Kartverket) – lastes ved første søk */
let ALLE_ADR = null, ALLE_ADR_LASTER = false;
function lastAlleAdresser() {
  if (ALLE_ADR || ALLE_ADR_LASTER) return;
  ALLE_ADR_LASTER = true;
  fetch("data/adresser_4204.json", { cache: "force-cache" }).then(r => r.json()).then(liste => {
    const harSaker = new Set(POIS.map(p => addrKey(p.label)));
    ALLE_ADR = liste.filter(a => !harSaker.has(addrKey(a.adressetekst)));
    // oppdater åpne forslag med de nye treffene
    if (suggest.style.display === "block" && qInput.value.trim().length >= 2)
      drawSuggest(searchMatches(qInput.value));
  }).catch(() => { ALLE_ADR_LASTER = false; });
}
function virtuellPoi(a) {
  return { label: a.adressetekst, latlon: [a.lat, a.lon], cases: [],
           matrikkel: a.gnr + "/" + a.bnr, postnr: a.postnr };
}

function searchMatches(q) {
  q = q.toLowerCase().trim();
  if (q.length < 2) return [];
  // Sakstreff (respekterer aktive filtre: sakstype, år, kartutsnitt)
  const hits = DATA.cases.filter(c => matchesFilters(c) && hayHit(c, q));
  hits.sort(byActivity);
  const out = [];
  for (const p of POIS) {
    const l = p.label.toLowerCase();
    if (l.startsWith(q) || l.includes(" " + q)) out.push({ p, score: l.startsWith(q) ? 0 : 1 });
  }
  out.sort((a, b) => a.score - b.score || a.p.label.localeCompare(b.p.label));
  const res = out.slice(0, 5).map(o => ({ type: "addr", p: o.p, label: "📍 " + o.p.label, raw: o.p.label, sub: `${o.p.cases.length} sak(er)` }));
  // Offisielle adresser uten byggesaker (hele Kristiansand)
  if (ALLE_ADR && res.length < 5) {
    const ekstra = [];
    for (const a of ALLE_ADR) {
      const l = a.adressetekst.toLowerCase();
      if (l.startsWith(q) || l.includes(" " + q)) {
        ekstra.push({ a, score: l.startsWith(q) ? 0 : 1 });
        if (ekstra.length >= 24) break;
      }
    }
    ekstra.sort((x, y) => x.score - y.score || x.a.adressetekst.localeCompare(y.a.adressetekst));
    for (const e of ekstra.slice(0, 5 - res.length)) {
      res.push({ type: "nyadr", a: e.a, label: "📍 " + e.a.adressetekst, raw: e.a.adressetekst,
                 sub: "adresse uten byggesaker – åpne eiendomsprofil" });
    }
  }

  // Firmaer og saksbehandlere
  const ents = new Map();
  for (const c of DATA.cases) {
    if (c.soker && c.soker.toLowerCase().includes(q)) {
      const k = "firma|" + c.soker;
      ents.set(k, (ents.get(k) || 0) + 1);
    }
    if (c.saksbehandler && c.saksbehandler.toLowerCase().includes(q)) {
      const k = "sb|" + c.saksbehandler;
      ents.set(k, (ents.get(k) || 0) + 1);
    }
  }
  [...ents.entries()].sort((a, b) => b[1] - a[1]).slice(0, 3).forEach(([k, n]) => {
    const [kind, name] = [k.slice(0, k.indexOf("|")), k.slice(k.indexOf("|") + 1)];
    res.push({ type: "ent", kind, name, label: (kind === "firma" ? "🏢 " : "👤 ") + name,
               sub: `${n} sak(er) som ${kind === "firma" ? "søker" : "saksbehandler"}` });
  });

  // Tiltakstyper («basseng», «garasje» …)
  const kats = new Map();
  for (const c of DATA.cases) for (const k of (c.kategorier || [])) {
    if (k.toLowerCase().includes(q)) kats.set(k, (kats.get(k) || 0) + 1);
  }
  [...kats.entries()].sort((a, b) => b[1] - a[1]).slice(0, 2).forEach(([k, n]) =>
    res.push({ type: "kat", name: k, label: "🏷 " + k, sub: `${n} saker – vis alle` }));

  const res2 = res.slice(0, 5);
  // Toppsaker direkte i listen
  hits.slice(0, 4).forEach(c => res2.push({
    type: "case", c,
    label: "📄 " + (c.description || displayAddr(c)).slice(0, 60),
    sub: `${displayAddr(c)} · ${c.casenr}${c.lastDate ? " · " + fmtMonth(c.lastDate) : ""}`,
  }));
  if (hits.length) res2.push({ type: "alle", q, hits, label: `📋 Vis alle ${hits.length} treff`, sub: "åpner som liste – filtrene dine gjelder" });
  return res2;
}
function drawSuggest(items) {
  selIdx = -1;
  if (!items.length) { suggest.style.display = "none"; suggest.innerHTML = ""; return; }
  suggest.innerHTML = items.map((it, i) =>
    `<button data-i="${i}">${esc(it.label)} <span class="s-sub">${esc(it.sub)}</span></button>`).join("");
  suggest.style.display = "block";
  suggest.querySelectorAll("button").forEach(b => b.onclick = () => pickSuggest(items[parseInt(b.dataset.i, 10)]));
  suggest._items = items;
}
function pickSuggest(it) {
  suggest.style.display = "none";
  const sokTekst = (it.type === "alle" ? it.q : document.getElementById("q").value).trim();
  if (sokTekst.length > 1) fireEvent("sok", sokTekst);
  if (it.type !== "alle") {
    document.getElementById("q").value = it.raw || it.name || (it.type === "case" ? it.c.casenr : it.label);
    state.q = "";
    render();
  }
  if (it.type === "addr") flyToPoi(it.p);
  else if (it.type === "nyadr") {
    const vp = virtuellPoi(it.a);
    map.flyTo(vp.latlon, Math.max(map.getZoom(), 16), { duration: 0.8 });
    setTimeout(() => navOpen("poi:" + addrKey(vp.label), () => renderEiendom(vp)), 850);
  }
  else if (it.type === "ent") openEntity(it.kind, it.name);
  else if (it.type === "kat") openCaseList("Tiltakstype: " + it.name,
    "", DATA.cases.filter(c => (c.kategorier || []).includes(it.name)).sort(byActivity));
  else if (it.type === "alle") openCaseList(`Søk: «${it.q}»`, "med aktive filtre", it.hits);
  else focusCase(it.c);
}

    selIdx = (selIdx + (e.key === "ArrowDown" ? 1 : -1) + items.length) % items.length;
    suggest.querySelectorAll("button").forEach((b, i) => b.classList.toggle("sel", i === selIdx));
  } else if (e.key === "Enter") {
    if (!items.length) return;
    if (selIdx >= 0) { pickSuggest(items[selIdx]); return; }   // eksplisitt valgt med piltast
    const alle = items.find(i => i.type === "alle");           // ellers: hele trefflisten
    pickSuggest(alle || items[0]);
  } else if (e.key === "Escape") {
    suggest.style.display = "none";
  }
});

/* ---------------- PDF/bilde-viser ---------------- */
function proxyUrl(url) {
  if (CFG.pdfProxy) return CFG.pdfProxy + "?url=" + encodeURIComponent(url);
  if (IS_LOCAL) return "/pdfproxy?url=" + encodeURIComponent(url);
  return null;
}
let pdfjsReady = null;
function loadPdfJs() {
  if (pdfjsReady) return pdfjsReady;
  pdfjsReady = new Promise((res, rej) => {
    const s = document.createElement("script");
    s.src = "https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js";
    s.onload = () => {
      window.pdfjsLib.GlobalWorkerOptions.workerSrc = "https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.worker.min.js";
      res(window.pdfjsLib);
    };
    s.onerror = rej;
    document.head.appendChild(s);
  });
  return pdfjsReady;
}
function openFile(a) {
  const url = a.getAttribute("href");
  const name = a.dataset.name || "Dokument";
  const caseNr = a.closest(".case")?.dataset.nr || "";
  fireEvent("dok", (caseNr ? caseNr + " · " : "") + name);
  if (!IS_HTTP || !proxyUrl(url)) { window.open(url, "_blank"); return false; }
  showViewer(url, name);
  return false;
}
async function showViewer(url, name) {
  const v = document.getElementById("viewer");
  const body = document.getElementById("viewerBody");
  document.getElementById("viewerTitle").textContent = name;
  document.getElementById("viewerExt").href = url;
  body.innerHTML = '<div id="viewerMsg">Laster dokument …</div>';
  v.classList.add("open");
  const proxied = proxyUrl(url);
  const isImg = /\.(jpe?g|png|gif|webp|bmp)(\?|$)/i.test(url);
  try {
    if (isImg) { body.innerHTML = `<img src="${esc(proxied)}" alt="${esc(name)}">`; return; }
    const pdfjs = await loadPdfJs();
    const pdf = await pdfjs.getDocument({ url: proxied }).promise;
    body.innerHTML = "";
    const width = Math.min(document.documentElement.clientWidth - 24, 900);
    for (let i = 1; i <= pdf.numPages; i++) {
      const page = await pdf.getPage(i);
      const base = page.getViewport({ scale: 1 });
      const scale = width / base.width;
      const vp = page.getViewport({ scale: scale * (window.devicePixelRatio || 1) });
      const canvas = document.createElement("canvas");
      canvas.width = vp.width; canvas.height = vp.height;
      canvas.style.width = width + "px";
      body.appendChild(canvas);
      await page.render({ canvasContext: canvas.getContext("2d"), viewport: vp }).promise;
    }
  } catch (err) {
    body.innerHTML = `<div id="viewerMsg">Kunne ikke vise dokumentet her (${esc(String(err.message || err))}).<br><br>
      <a href="${esc(url)}" target="_blank" rel="noopener" style="color:#6db2ff">Åpne i egen fane i stedet ↗</a></div>`;
  }
}
function closeViewer() {
  document.getElementById("viewer").classList.remove("open");
  document.getElementById("viewerBody").innerHTML = "";
}
document.addEventListener("keydown", e => { if (e.key === "Escape") closeViewer(); });

/* ---------------- Bunnark-drag (mobil) ---------------- */
(function () {
  const head = document.getElementById("panelHead");
  const grip = document.getElementById("grip");
  let startY = 0, startH = 0, dragging = false, moved = false;
  let activePointers = 0;
  const down = e => {
    activePointers++;
    if (activePointers > 1) { dragging = false; return; }
    if (e.target.closest("button, select, input, a")) return;
    dragging = true; moved = false; startY = e.clientY;
    startH = window.innerHeight - panel.getBoundingClientRect().top;
    e.currentTarget.setPointerCapture(e.pointerId);
    panel.style.transition = "none";
  };
  const move = e => {
    if (!dragging) return;
    if (Math.abs(e.clientY - startY) > 6) moved = true;
    if (!moved) return;
    const h = Math.min(Math.max(startH + (startY - e.clientY), 90), window.innerHeight * 0.92);
    panel.style.setProperty("--sheet", (h / window.innerHeight * 100) + "dvh");
  };
  const up = () => {
    activePointers = Math.max(0, activePointers - 1);
    if (!dragging) return;
    dragging = false;
    panel.style.transition = "";
    if (!moved) return;
    const frac = (window.innerHeight - panel.getBoundingClientRect().top) / window.innerHeight;
    if (frac < 0.22) closePanel();
    else if (frac < 0.55) panel.style.setProperty("--sheet", "55dvh");
    else panel.style.setProperty("--sheet", "92dvh");
  };
  for (const el of [head, grip]) {
    el.addEventListener("pointerdown", down);
    el.addEventListener("pointermove", move);
    el.addEventListener("pointerup", up);
    el.addEventListener("pointercancel", up);
  }
  // Scroller man i innholdet mens arket er halvåpent, løftes det til fullskjerm
  const pBody = document.getElementById("panelBody");
  pBody.addEventListener("scroll", function () {
    if (!IS_MOBILE_MQ.matches) return;
    const frac = (window.innerHeight - panel.getBoundingClientRect().top) / window.innerHeight;
    if (frac < 0.8 && this.scrollTop > 25) panel.style.setProperty("--sheet", "92dvh");
  }, { passive: true });

  // Sveip hvor som helst i innholdet (ikke på skjema-felt): opp = maksimer, ned fra toppen = minimer/lukk
  let tY = null, tX = null, tScroll = 0, tHandled = false, tInteractive = false;
  pBody.addEventListener("touchstart", e => {
    if (e.touches.length > 1) { tY = null; tHandled = true; return; }  // knip = aldri sveip
    tY = e.touches[0].clientY;
    tX = e.touches[0].clientX;
    tScroll = pBody.scrollTop;
    tHandled = false;
    tInteractive = !!e.target.closest("textarea, select, input");
  }, { passive: true });
  pBody.addEventListener("touchmove", e => {
    if (e.touches.length > 1) { tY = null; tHandled = true; return; }  // ble til knip underveis
    if (!IS_MOBILE_MQ.matches || tY === null || tHandled || tInteractive) return;
    const dy = e.touches[0].clientY - tY;
    const dx = e.touches[0].clientX - tX;
    if (Math.abs(dx) > Math.abs(dy)) return;            // sidelengs bevegelse = ikke sveip
    const frac = (window.innerHeight - panel.getBoundingClientRect().top) / window.innerHeight;
    if (dy < -26 && frac < 0.85) {                      // sveip opp -> fullskjerm
      panel.style.setProperty("--sheet", "92dvh");
      tHandled = true;
    } else if (dy > 48 && tScroll <= 2 && pBody.scrollTop <= 2) {  // sveip ned fra toppen (roligere terskel)
      if (frac > 0.72) panel.style.setProperty("--sheet", "55dvh");
      else closePanel();
      tHandled = true;
    }
  }, { passive: true });
  pBody.addEventListener("touchend", () => { tY = null; }, { passive: true });
})();

async function refreshData() {
  if (!IS_HTTP) return;
  try {
    const r = await fetch("data/index.json", { cache: "no-store" });
    if (!r.ok) return;
    const fresh = await r.json();
    if (fresh.updated !== DATA.updated) {
      applyIndex(fresh);
      render();
      showToasts();
    }
  } catch { /* offline er greit */ }
}
function applyIndex(idx) {
  DATA = { updated: idx.updated, updatedLocal: idx.updatedLocal,
           poiSummaries: idx.poiSummaries || {}, cases: (idx.cases || []).map(inflate) };
  for (const k of Object.keys(CHUNKS)) delete CHUNKS[k];
  POIS = buildPois();
  NOGEO = DATA.cases.filter(c => !c.latlon);
}

  const t = params.get("login");
  if (!t || !CFG.apiBase) return;
  history.replaceState(null, "", location.pathname);
  try {
    const res = await api("/verify?token=" + encodeURIComponent(t));

    renderAccountState();
    await pullAccount();
    openKonto();

    box.appendChild(el);
    setTimeout(() => el.remove(), 8000);
  } catch (e) {

})();
