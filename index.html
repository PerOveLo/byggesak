<!DOCTYPE html>
<html lang="nb">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<meta name="theme-color" content="#eef1f6">
<title>Byggesaker Kristiansand</title>
<link rel="manifest" href="manifest.json">
<link rel="icon" href="ikon.svg" type="image/svg+xml">
<link rel="apple-touch-icon" href="ikon.svg">
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css">
<link rel="stylesheet" href="https://unpkg.com/leaflet.markercluster@1.5.3/dist/MarkerCluster.css">
<style>
  :root {
    --blue: #0a84ff; --orange: #ff9f0a; --red: #ff453a; --green: #30d158; --purple: #bf5af2;
    --bg-solid: #eef1f6; --card: rgba(255,255,255,.72);
    --ink: #1c1c1e; --ink2: #55555c; --ink3: #9a9aa2;
    --line: rgba(60,60,67,.12); --fill: rgba(120,120,128,.14); --fill2: rgba(120,120,128,.24);
    /* Liquid glass */
    --glass: linear-gradient(135deg, rgba(255,255,255,.55) 0%, rgba(255,255,255,.28) 55%, rgba(255,255,255,.38) 100%);
    --glass-strong: linear-gradient(135deg, rgba(255,255,255,.72) 0%, rgba(255,255,255,.42) 100%);
    --glass-border: rgba(255,255,255,.65);
    --glass-inset: inset 0 1px 0 rgba(255,255,255,.75), inset 0 -1px 1px rgba(255,255,255,.15);
    --shadow: 0 16px 50px rgba(15,20,40,.22), 0 2px 8px rgba(15,20,40,.08);
    --radius: 26px; --blur: saturate(1.9) blur(26px);
  }
  @media (prefers-color-scheme: dark) {
    :root {
      --bg-solid: #101014; --card: rgba(46,46,52,.6);
      --ink: #f5f5f7; --ink2: #a8a8b0; --ink3: #6c6c74;
      --line: rgba(255,255,255,.09); --fill: rgba(120,120,128,.24); --fill2: rgba(120,120,128,.36);
      --glass: linear-gradient(135deg, rgba(52,52,60,.62) 0%, rgba(28,28,34,.48) 55%, rgba(44,44,52,.55) 100%);
      --glass-strong: linear-gradient(135deg, rgba(64,64,72,.72) 0%, rgba(36,36,42,.6) 100%);
      --glass-border: rgba(255,255,255,.16);
      --glass-inset: inset 0 1px 0 rgba(255,255,255,.22), inset 0 -1px 1px rgba(255,255,255,.05);
      --shadow: 0 16px 50px rgba(0,0,0,.6), 0 2px 8px rgba(0,0,0,.4);
    }
  }
  .glass {
    background: var(--glass);
    backdrop-filter: var(--blur); -webkit-backdrop-filter: var(--blur);
    border: 1px solid var(--glass-border);
    box-shadow: var(--shadow), var(--glass-inset);
  }
  * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
  html, body { height: 100%; margin: 0; overflow: hidden;
    font-family: -apple-system, BlinkMacSystemFont, "SF Pro Text", "Segoe UI Variable", "Segoe UI", Roboto, sans-serif;
    color: var(--ink); background: var(--bg-solid);
    -webkit-font-smoothing: antialiased; }
  button { font: inherit; color: inherit; border: none; background: none; cursor: pointer; }
  input { font: inherit; }
  #map { position: fixed; inset: 0; z-index: 0; background: #dfe8ef; }

  /* ---------- Toppbar ---------- */
  .topbar {
    position: fixed; top: calc(env(safe-area-inset-top, 0px) + 10px); left: 10px; right: 10px; z-index: 1000;
    display: flex; align-items: center; gap: 10px; flex-wrap: wrap;
    padding: 10px 16px;
    background: var(--glass);
    backdrop-filter: var(--blur); -webkit-backdrop-filter: var(--blur);
    border: 1px solid var(--glass-border);
    border-radius: var(--radius);
    box-shadow: var(--shadow), var(--glass-inset);
  }
  .brand { display: flex; flex-direction: column; margin-right: 4px; }
  .brand h1 { font-size: 17px; font-weight: 700; margin: 0; letter-spacing: -.2px; }
  .brand span { font-size: 11px; color: var(--ink2); }
  .searchwrap { position: relative; flex: 1 1 170px; max-width: 330px; }
  .searchwrap input {
    width: 100%; padding: 8px 12px 8px 32px; border: 1px solid var(--glass-border); border-radius: 999px;
    background: var(--glass-strong); color: var(--ink); outline: none; font-size: 14px;
    box-shadow: var(--glass-inset);
  }
  .searchwrap input:focus { border-color: var(--blue); }
  .searchwrap input { padding-right: 36px; }
  .searchwrap .clearbtn { position: absolute; right: 7px; top: 15px; transform: translateY(-50%);
    width: 24px; height: 24px; border-radius: 50%; background: var(--fill2); color: var(--ink2);
    font-size: 11px; font-weight: 700; display: none; align-items: center; justify-content: center; }
  .searchwrap.has-text .clearbtn { display: flex; }
  .searchwrap::before { content: "🔍"; position: absolute; left: 9px; top: 15px; transform: translateY(-50%); font-size: 12px; opacity: .55; }
  #suggest {
    position: absolute; top: 40px; left: 0; right: 0; z-index: 1500;
    background: var(--glass-strong); backdrop-filter: var(--blur); -webkit-backdrop-filter: var(--blur);
    border-radius: 18px; box-shadow: var(--shadow), var(--glass-inset);
    border: 1px solid var(--glass-border); overflow: hidden; display: none;
  }
  #suggest button { display: block; width: 100%; text-align: left; padding: 9px 13px; font-size: 13.5px; }
  #suggest button:hover, #suggest button.sel { background: var(--fill); }
  #suggest .s-sub { font-size: 11px; color: var(--ink2); }
  .seg {
    display: flex; background: rgba(120,120,128,.14); border-radius: 999px; padding: 3px; gap: 2px;
    box-shadow: inset 0 1px 3px rgba(0,0,0,.08);
  }
  .seg button {
    padding: 6px 12px; border-radius: 999px; font-size: 13px; font-weight: 600; color: var(--ink2);
    transition: all .22s cubic-bezier(.32,.72,.24,1); white-space: nowrap;
  }
  .seg button.on {
    background: var(--glass-strong); color: var(--ink);
    box-shadow: 0 2px 10px rgba(0,0,0,.16), inset 0 1px 0 rgba(255,255,255,.6);
    border: 0.5px solid var(--glass-border);
  }
  .seg button .dot { display: inline-block; width: 8px; height: 8px; border-radius: 50%; margin-right: 5px; }
  select.pill {
    appearance: none; -webkit-appearance: none; outline: none;
    background: var(--glass-strong); color: var(--ink); border: 1px solid var(--glass-border);
    border-radius: 999px; padding: 8px 14px; font-size: 13px; font-weight: 600;
    box-shadow: var(--glass-inset);
  }
  .iconbtn {
    position: relative; height: 38px; min-width: 38px; padding: 0 12px; border-radius: 999px;
    background: var(--glass-strong); border: 1px solid var(--glass-border);
    box-shadow: var(--glass-inset);
    font-size: 15px; display: flex; align-items: center; justify-content: center; gap: 5px;
    transition: transform .15s ease, box-shadow .15s ease; font-weight: 600;
  }
  .iconbtn:hover { transform: translateY(-1px); box-shadow: 0 6px 18px rgba(0,0,0,.18), var(--glass-inset); }
  .iconbtn:active { transform: scale(.96); }
  .iconbtn .lbl { font-size: 13px; }
  .iconbtn .bubble {
    position: absolute; top: -4px; right: -4px; min-width: 17px; height: 17px; padding: 0 4px;
    border-radius: 9px; background: var(--red); color: #fff; font-size: 11px; font-weight: 700;
    display: flex; align-items: center; justify-content: center;
  }
  .only-mobile { display: none !important; }
  @media (max-width: 760px) {
    .iconbtn .lbl { display: none; }
    .only-mobile { display: flex !important; }
    #menuBtn { margin-left: auto; }
    /* iOS auto-zoomer på felt med skrift < 16px – hold alle inndatafelt på 16px */
    input, select, textarea { font-size: 16px !important; }
    .m-hide { display: none !important; }
    #typeSeg { order: 6; width: 100%; justify-content: center; background: transparent;
      padding: 0; gap: 6px; box-shadow: none; display: none; flex-wrap: wrap; }
    .topbar.search-active #typeSeg { display: flex; }
    .searchwrap .clearbtn { width: 30px; height: 30px; font-size: 13px; right: 8px; }
    #typeSeg button { background: var(--glass-strong); border: 1px solid var(--glass-border);
      padding: 5px 11px; font-size: 12px; box-shadow: var(--glass-inset); opacity: .55; }
    #typeSeg button.on { opacity: 1; box-shadow: 0 2px 8px rgba(0,0,0,.18), inset 0 1px 0 rgba(255,255,255,.5); }
    .topbar { gap: 8px; padding: 8px 12px; }
    .brand h1 { font-size: 15px; }
    .brand span { display: none; }
  }
  #menuSheet {
    position: fixed; top: calc(env(safe-area-inset-top, 0px) + 68px); left: 10px; right: 10px; z-index: 1500;
    display: none; flex-direction: column; gap: 12px; padding: 14px;
    border-radius: 22px; background: var(--glass-strong);
    backdrop-filter: var(--blur); -webkit-backdrop-filter: var(--blur);
    border: 1px solid var(--glass-border); box-shadow: var(--shadow), var(--glass-inset);
  }
  #menuSheet.open { display: flex; }
  #menuControls { display: flex; flex-direction: column; gap: 10px; }
  #menuControls .seg { flex-wrap: wrap; width: 100%; }
  .menu-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; }
  .menu-item { display: flex; align-items: center; gap: 8px; padding: 13px 14px; border-radius: 14px;
    background: var(--card); font-weight: 600; font-size: 14px; border: 0.5px solid var(--glass-border); }
  .menu-item:active { transform: scale(.97); }
  .mbadge { margin-left: auto; background: var(--red); color: #fff; font-size: 11px; font-weight: 700;
    border-radius: 999px; padding: 2px 7px; display: none; }
  .vizbo-m { align-items: center; padding: 0 2px; opacity: .92; }
  .vizbo-m img { height: 26px; display: block; }
  @media (prefers-color-scheme: dark) { .vizbo-m img { filter: invert(1); } }
  @media (max-width: 760px) { .searchwrap { order: 5; flex-basis: 100%; max-width: none; } }
  .vizbo { display: flex; align-items: center; margin-left: auto; padding: 0 4px; opacity: .92; transition: opacity .15s; }
  .vizbo:hover { opacity: 1; }
  .vizbo img { height: 30px; display: block; }
  @media (prefers-color-scheme: dark) { .vizbo img { filter: invert(1); } }
  @media (max-width: 760px) { .vizbo img { height: 22px; } .vizbo { margin-left: 0; } }

  /* ---------- Panel ---------- */
  #panel {
    position: fixed; z-index: 1100; display: flex; flex-direction: column;
    background: var(--glass);
    backdrop-filter: var(--blur); -webkit-backdrop-filter: var(--blur);
    box-shadow: var(--shadow), var(--glass-inset); overflow: hidden;
    transition: transform .32s cubic-bezier(.32,.72,.24,1);
  }
  @media (min-width: 761px) {
    #panel {
      top: 86px; right: 12px; bottom: 12px; width: min(440px, 44vw);
      border-radius: var(--radius); border: 1px solid var(--glass-border);
      transform: translateX(calc(100% + 24px));
    }
    #panel.open { transform: translateX(0); }
    .sheet-grip { display: none; }
  }
  @media (max-width: 760px) {
    #panel {
      left: 0; right: 0; bottom: 0; height: 92dvh;
      border-radius: 26px 26px 0 0; border-top: 1px solid var(--glass-border);
      transform: translateY(100%);
      background: rgba(238, 241, 246, .94);
    }
    #panel.open { transform: translateY(calc(100% - var(--sheet, 60dvh))); }
    .sheet-grip { width: 60px; height: 6px; border-radius: 3px; background: var(--ink3);
      margin: 10px auto 4px; flex-shrink: 0; }
    #panelHead { touch-action: none; cursor: grab; }
    .barrow .b-track { background: rgba(120,120,128,.22); }
    .barrow { padding: 5px 0; }
  }
  #panelHead { display: flex; align-items: flex-start; gap: 8px; padding: 12px 16px 8px; }
  #panelHead .titles { flex: 1; min-width: 0; }
  #panelHead h2 { margin: 0; font-size: 21px; font-weight: 700; letter-spacing: -.3px; }
  #panelHead .sub { font-size: 12.5px; color: var(--ink2); margin-top: 2px; }
  .headbtn { width: 34px; height: 34px; border-radius: 50%; background: var(--glass-strong); font-size: 16px;
    border: 1px solid var(--glass-border); box-shadow: var(--glass-inset);
    display: flex; align-items: center; justify-content: center; flex-shrink: 0; transition: transform .15s; }
  .headbtn:active { transform: scale(.92); }
  .headbtn.on { color: var(--orange); }
  .closebtn { width: 30px; height: 30px; border-radius: 50%; background: var(--glass-strong); color: var(--ink2);
    border: 1px solid var(--glass-border); box-shadow: var(--glass-inset);
    font-size: 13px; font-weight: 700; display: flex; align-items: center; justify-content: center; flex-shrink: 0; }
  #panelBody { flex: 1; overflow-y: auto; overflow-x: hidden; padding: 4px 14px calc(env(safe-area-inset-bottom, 0px) + 24px); overscroll-behavior: contain; }
  #panel { max-width: 100vw; }
  #panelHead h2, .case-desc, .doc .d-title, .a-name, .summary { overflow-wrap: anywhere; }
  .addrrow { flex-wrap: wrap; }
  .formrow { flex-wrap: wrap; }
  .kpi { min-width: 0; }

  .ai-box {
    background: linear-gradient(135deg, rgba(10,132,255,.10), rgba(191,90,242,.10));
    border: 0.5px solid rgba(10,132,255,.25);
    border-radius: 14px; padding: 12px 14px; margin: 8px 0 14px; font-size: 13.5px; line-height: 1.55;
  }
  .ai-box h3 { margin: 0 0 6px; font-size: 11.5px; text-transform: uppercase; letter-spacing: .8px; color: var(--blue); }
  .ai-box p { margin: 0; white-space: pre-wrap; }
  .ai-box .stamp { font-size: 11px; color: var(--ink2); margin-top: 8px; }

  .sectionlabel { font-size: 12px; font-weight: 700; text-transform: uppercase; letter-spacing: .7px;
    color: var(--ink2); margin: 14px 4px 8px; }
  .case {
    background: var(--card); border-radius: 18px; margin-bottom: 10px;
    backdrop-filter: blur(10px); -webkit-backdrop-filter: blur(10px);
    box-shadow: 0 2px 10px rgba(15,20,40,.08), inset 0 1px 0 rgba(255,255,255,.5);
    overflow: hidden; border: 0.5px solid var(--glass-border);
  }
  @media (prefers-color-scheme: dark) {
    .case { box-shadow: 0 2px 10px rgba(0,0,0,.3), inset 0 1px 0 rgba(255,255,255,.1); }
  }
  @media (max-width: 760px) and (prefers-color-scheme: dark) {
    #panel { background: rgba(16, 16, 20, .94); }
  }
  .case-head { padding: 12px 14px 11px; cursor: pointer; }
  .case-head:active { background: var(--fill); }
  .case-top { display: flex; align-items: center; gap: 7px; flex-wrap: wrap; }
  .pill { font-size: 11px; padding: 3px 9px; border-radius: 999px; font-weight: 650; }
  .pill.Byggesak { background: rgba(10,132,255,.14); color: var(--blue); }
  .pill.Henvendelse { background: rgba(255,159,10,.16); color: #c77700; }
  .pill.Ulovlighetssak { background: rgba(255,69,58,.14); color: var(--red); }
  .pill.Plansak { background: rgba(191,90,242,.15); color: var(--purple); }
  .fase { font-size: 11px; padding: 3px 9px; border-radius: 999px; font-weight: 650; }
  .fase.Oppstart { background: rgba(10,132,255,.14); color: var(--blue); }
  .fase.Planprogram, .fase.Førstegangsbehandling { background: rgba(120,120,128,.18); color: var(--ink2); }
  .fase.Påhøring { background: rgba(255,159,10,.18); color: #c77700; }
  .fase.Vedtatt { background: rgba(48,209,88,.16); color: #1e9e4a; }
  .plancard { background: var(--card); border: 0.5px solid var(--glass-border); border-radius: 18px;
    margin-bottom: 12px; overflow: hidden;
    box-shadow: 0 2px 10px rgba(15,20,40,.08), inset 0 1px 0 rgba(255,255,255,.5); }
  .plancard .case { border: none; box-shadow: none; border-radius: 0; margin: 0; }
  .planbanner { position: relative; height: 130px; background: linear-gradient(135deg, rgba(191,90,242,.25), rgba(10,132,255,.2));
    display: flex; align-items: center; justify-content: center; overflow: hidden; }
  .planbanner img, .planbanner canvas { width: 100%; height: 100%; object-fit: cover; display: block; }
  .planbanner .ph { font-size: 34px; opacity: .5; }
  .planbanner .fase { position: absolute; top: 8px; right: 8px; backdrop-filter: blur(8px);
    background: rgba(255,255,255,.75); }
  @media (prefers-color-scheme: dark) { .planbanner .fase { background: rgba(30,30,34,.75); color: var(--ink); } }
  @media (prefers-color-scheme: dark) { .pill.Henvendelse { color: var(--orange); } }
  .statusdot { width: 8px; height: 8px; border-radius: 50%; flex-shrink: 0; }
  .status-txt { font-size: 12px; font-weight: 600; color: var(--ink2); }
  .case-date { margin-left: auto; font-size: 11.5px; color: var(--ink3); font-variant-numeric: tabular-nums; }
  .case-desc { font-size: 14.5px; font-weight: 600; margin-top: 6px; line-height: 1.35; letter-spacing: -.1px; }
  .case-addr { font-size: 12px; color: var(--ink2); margin-top: 2px; }
  .followbtn { margin-left: 2px; font-size: 17px; line-height: 1; opacity: .35; transition: transform .15s, opacity .15s; }
  .followbtn.on { opacity: 1; transform: scale(1.1); }
  .sharebtn { font-size: 14px; line-height: 1; opacity: .4; padding: 2px 4px; }
  .sharebtn:active { opacity: 1; transform: scale(1.15); }
  @media (max-width: 760px) { .sharebtn, .followbtn { font-size: 19px; padding: 4px 6px; } }
  .newbadge { background: var(--red); color: #fff; font-size: 10.5px; font-weight: 700; border-radius: 999px; padding: 2px 7px; }
  .case-body { display: none; padding: 0 14px 13px; }
  .case.open .case-body { display: block; }
  .case-body .summary { font-size: 13px; line-height: 1.55; background: var(--fill); border-radius: 11px; padding: 10px 12px; margin: 2px 0 10px; }
  .case-body .meta { font-size: 12px; color: var(--ink2); margin-bottom: 6px; line-height: 1.6; }
  .tl { position: relative; margin: 6px 0 4px; padding-left: 16px; border-left: 2px solid var(--fill2); }
  .doc { position: relative; padding: 7px 0; }
  .doc::before { content: ""; position: absolute; left: -21.5px; top: 13px; width: 9px; height: 9px; border-radius: 50%;
    background: var(--ink3); border: 2px solid var(--card); }
  .doc.dated::before { background: var(--blue); }
  .doc .d-date { font-size: 11px; color: var(--ink2); font-variant-numeric: tabular-nums; font-weight: 600; }
  .doc .d-title { font-size: 13px; line-height: 1.4; margin: 1px 0 2px; }
  .doc .d-meta { font-size: 11px; color: var(--ink3); }
  .filechip {
    display: inline-flex; align-items: center; gap: 5px; margin: 4px 6px 0 0; padding: 5px 10px;
    background: rgba(10,132,255,.12); color: var(--blue); border-radius: 999px; font-size: 12px; font-weight: 600;
    text-decoration: none;
  }
  .filechip:active { background: rgba(10,132,255,.25); }
  .extlink { display: inline-block; margin-top: 10px; font-size: 13px; color: var(--blue); text-decoration: none; font-weight: 600; }

  .addrrow {
    display: flex; align-items: center; gap: 10px; background: var(--card); border: 0.5px solid var(--glass-border);
    backdrop-filter: blur(10px); -webkit-backdrop-filter: blur(10px);
    border-radius: 999px; padding: 11px 16px; margin-bottom: 8px; cursor: pointer;
    box-shadow: 0 2px 10px rgba(15,20,40,.08), inset 0 1px 0 rgba(255,255,255,.5);
  }
  .addrrow .a-name { font-weight: 650; font-size: 14px; }
  .addrrow .a-sub { font-size: 12px; color: var(--ink2); }
  .addrrow .unfollow { margin-left: auto; color: var(--ink3); font-size: 13px; }

  /* Skjema (varsling) */
  .formbox { background: var(--card); border: 0.5px solid var(--glass-border); border-radius: 18px; padding: 14px 16px; margin-bottom: 10px;
    backdrop-filter: blur(10px); -webkit-backdrop-filter: blur(10px);
    box-shadow: 0 2px 10px rgba(15,20,40,.08), inset 0 1px 0 rgba(255,255,255,.5); }
  .formbox h4 { margin: 0 0 4px; font-size: 14px; }
  .formbox p { margin: 4px 0 10px; font-size: 12.5px; color: var(--ink2); line-height: 1.5; }
  .formrow { display: flex; gap: 8px; }
  .formrow input {
    flex: 1; padding: 9px 12px; border: 0.5px solid var(--line); border-radius: 10px;
    background: var(--fill); color: var(--ink); outline: none; font-size: 14px; min-width: 0;
  }
  .btn { background: linear-gradient(180deg, #2f97ff, #0a84ff); color: #fff; border-radius: 999px; padding: 9px 16px;
    font-size: 13.5px; font-weight: 650; white-space: nowrap;
    box-shadow: 0 4px 14px rgba(10,132,255,.4), inset 0 1px 0 rgba(255,255,255,.4);
    transition: transform .15s ease; }
  .btn:active { transform: scale(.96); }
  .btn.sec { background: var(--glass-strong); color: var(--ink); border: 1px solid var(--glass-border);
    box-shadow: var(--glass-inset); }
  .formmsg { font-size: 12.5px; margin-top: 8px; }
  .formmsg.ok { color: var(--green); } .formmsg.err { color: var(--red); }

  /* ---------- Markører ---------- */
  .poi { border-radius: 50%; color: #fff; font-weight: 700; font-size: 12px;
    display: flex; align-items: center; justify-content: center;
    box-shadow: 0 2px 8px rgba(0,0,0,.35); border: 2.5px solid rgba(255,255,255,.95); }
  .poi.pulse::after { content: ""; position: absolute; inset: -7px; border-radius: 50%;
    border: 3px solid var(--red); animation: pulse 1.6s ease-out infinite; }
  .hl-pulse { width: 52px; height: 52px; border-radius: 50%;
    border: 3px solid #ff453a; box-shadow: 0 0 0 3px rgba(255,69,58,.25), 0 0 24px rgba(255,69,58,.5);
    animation: pulse 1.4s ease-out infinite; }
  @keyframes pulse { 0% { transform: scale(.6); opacity: 1; } 100% { transform: scale(1.25); opacity: 0; } }
  .cluster {
    background: linear-gradient(135deg, rgba(255,255,255,.92), rgba(255,255,255,.68));
    backdrop-filter: blur(6px) saturate(1.6); color: #1c1c1e;
    border-radius: 50%; display: flex; align-items: center; justify-content: center;
    font-weight: 700; font-size: 12.5px;
    box-shadow: 0 4px 14px rgba(15,20,40,.3), inset 0 1px 0 rgba(255,255,255,.9);
    border: 1px solid rgba(255,255,255,.8); }

  .legend {
    position: fixed; left: 12px; bottom: calc(env(safe-area-inset-bottom, 0px) + 12px); z-index: 900;
    background: var(--glass); backdrop-filter: var(--blur); -webkit-backdrop-filter: var(--blur);
    border: 1px solid var(--glass-border); border-radius: 18px; padding: 10px 15px; font-size: 12px; line-height: 1.9;
    box-shadow: var(--shadow), var(--glass-inset);
  }
  .legend .dot { display: inline-block; width: 10px; height: 10px; border-radius: 50%; margin-right: 7px; }
  .updated-tag { color: var(--ink2); font-size: 11px; }
  @media (max-width: 760px) { .legend { display: none; } }

  /* ---------- Varsler ---------- */
  #toasts { position: fixed; top: calc(env(safe-area-inset-top, 0px) + 8px); left: 50%; transform: translateX(-50%);
    z-index: 3000; display: flex; flex-direction: column; gap: 8px; width: min(420px, calc(100vw - 24px)); }
  .toast {
    background: var(--glass); backdrop-filter: var(--blur); -webkit-backdrop-filter: var(--blur);
    border: 1px solid var(--glass-border); border-radius: 22px;
    box-shadow: var(--shadow), var(--glass-inset);
    padding: 12px 16px; display: flex; gap: 11px; align-items: center; cursor: pointer;
    animation: slidein .45s cubic-bezier(.32,.72,.24,1);
  }
  @keyframes slidein { from { transform: translateY(-24px); opacity: 0; } to { transform: none; opacity: 1; } }
  .toast .emoji { font-size: 22px; }
  .toast .t-title { font-size: 13px; font-weight: 700; }
  .toast .t-sub { font-size: 12px; color: var(--ink2); }
  .toast .t-x { margin-left: auto; color: var(--ink2); font-weight: 700; flex-shrink: 0;
    width: 32px; height: 32px; border-radius: 50%; background: var(--fill);
    display: flex; align-items: center; justify-content: center; font-size: 14px; }
  .toast .t-x:active { background: var(--fill2); }
  @media (max-width: 760px) {
    .toast .t-x { width: 44px; height: 44px; font-size: 17px; }
    .toast { padding: 12px 12px 12px 16px; }
  }

  /* ---------- PDF-viser ---------- */
  #viewer { position: fixed; inset: 0; z-index: 4000; display: none; flex-direction: column; background: rgba(0,0,0,.78); backdrop-filter: blur(8px); }
  #viewer.open { display: flex; }
  #viewerBar {
    display: flex; align-items: center; gap: 10px; padding: calc(env(safe-area-inset-top, 0px) + 10px) 14px 10px;
    color: #f5f5f7; font-size: 13.5px;
  }
  #viewerBar .vtitle { flex: 1; min-width: 0; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; font-weight: 600; }
  #viewerBar button, #viewerBar a {
    background: linear-gradient(135deg, rgba(255,255,255,.22), rgba(255,255,255,.1));
    border: 1px solid rgba(255,255,255,.25); border-radius: 999px; padding: 7px 14px; color: #fff;
    box-shadow: inset 0 1px 0 rgba(255,255,255,.25);
    font-size: 13px; font-weight: 600; text-decoration: none; white-space: nowrap;
  }
  #viewerBody { flex: 1; overflow: auto; text-align: center; padding: 8px 0 30px; }
  #viewerBody canvas, #viewerBody img { display: block; margin: 10px auto; max-width: calc(100vw - 20px);
    border-radius: 6px; box-shadow: 0 4px 30px rgba(0,0,0,.5); background: #fff; }
  #viewerMsg { color: #d1d1d6; padding: 60px 20px; font-size: 14px; }

  /* Statistikk */
  .kpis { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; margin: 8px 0 4px; }
  .kpi { background: var(--card); border: 0.5px solid var(--glass-border); border-radius: 16px; padding: 12px 14px;
    box-shadow: 0 2px 10px rgba(15,20,40,.08), inset 0 1px 0 rgba(255,255,255,.5); }
  .kpi .k-val { font-size: 24px; font-weight: 750; letter-spacing: -.5px; font-variant-numeric: tabular-nums; }
  .kpi .k-lbl { font-size: 11.5px; color: var(--ink2); margin-top: 2px; line-height: 1.35; }
  .bars { margin: 4px 0 2px; }
  .barrow { display: grid; grid-template-columns: 110px 1fr 34px; gap: 8px; align-items: center; padding: 3.5px 0; }
  .barrow .b-lbl { font-size: 12px; color: var(--ink2); overflow: hidden; text-overflow: ellipsis; white-space: nowrap; text-align: right; }
  .barrow .b-track { height: 14px; border-radius: 7px; background: var(--fill); overflow: hidden; }
  .barrow .b-fill { height: 100%; border-radius: 7px; min-width: 3px; }
  .barrow .b-val { font-size: 12px; font-weight: 650; font-variant-numeric: tabular-nums; }

  .entchip { display: inline-flex; align-items: center; gap: 5px; margin: 2px 6px 2px 0; padding: 4px 10px;
    background: var(--fill); border-radius: 999px; font-size: 12px; font-weight: 600; cursor: pointer; }
  .entchip .entstar { font-size: 13px; opacity: .5; }
  .entchip .entstar.on { opacity: 1; color: var(--orange); }
  .filegal { display: flex; flex-wrap: wrap; gap: 6px; margin: 4px 0 10px; }
  .filegal .filechip.tegning { background: rgba(48,209,88,.15); color: #1e9e4a; }
  @media (prefers-color-scheme: dark) { .filegal .filechip.tegning { color: var(--green); } }

  /* Notater og endringer */
  .notes textarea { width: 100%; min-height: 60px; border: 0.5px solid var(--glass-border); border-radius: 11px;
    background: var(--fill); color: var(--ink); padding: 9px 11px; font: inherit; font-size: 13px; outline: none; resize: vertical; }
  .notes .n-meta { display: flex; justify-content: space-between; align-items: center; font-size: 11.5px; color: var(--ink3); margin-top: 4px; }
  .endring { font-size: 12.5px; padding: 5px 0; border-top: 1px dashed var(--line); }
  .endring .e-date { color: var(--ink2); font-size: 11px; font-weight: 600; }

  .lvlsel { appearance: none; -webkit-appearance: none; border: 0.5px solid var(--glass-border); outline: none;
    background: var(--fill); color: var(--ink2); border-radius: 999px; padding: 4px 9px; font-size: 11.5px; font-weight: 600; }

  .listnote { text-align: center; font-size: 12px; color: var(--ink2); padding: 10px 0 4px; }

  /* Onboarding-modal */
  #onboard { position: fixed; inset: 0; z-index: 5000; display: none; align-items: center; justify-content: center;
    background: rgba(10,10,14,.45); backdrop-filter: blur(10px); -webkit-backdrop-filter: blur(10px); padding: 18px; }
  #onboard.open { display: flex; }
  .ob-card { width: min(430px, 100%); max-height: 86dvh; overflow-y: auto; border-radius: 26px;
    background: var(--glass-strong); backdrop-filter: var(--blur); -webkit-backdrop-filter: var(--blur);
    border: 1px solid var(--glass-border); box-shadow: var(--shadow), var(--glass-inset); padding: 22px 22px 18px; }
  .ob-card h2 { margin: 0 0 4px; font-size: 20px; letter-spacing: -.3px; }
  .ob-card .ob-sub { font-size: 13px; color: var(--ink2); margin-bottom: 14px; }
  .ob-step { display: flex; gap: 13px; align-items: center; background: var(--card); border: .5px solid var(--glass-border);
    border-radius: 15px; padding: 11px 13px; margin-bottom: 9px; }
  .ob-step .ob-ico { flex-shrink: 0; width: 44px; height: 44px; border-radius: 12px; display: flex; align-items: center;
    justify-content: center; background: rgba(10,132,255,.12); }
  .ob-step .ob-ico svg { width: 26px; height: 26px; stroke: var(--blue); fill: none; stroke-width: 2; stroke-linecap: round; stroke-linejoin: round; }
  .ob-step b { font-size: 13.5px; display: block; }
  .ob-step span { font-size: 12.5px; color: var(--ink2); line-height: 1.4; }
  .ob-dots { display: flex; gap: 6px; justify-content: center; margin: 12px 0 10px; }
  .ob-dots i { width: 7px; height: 7px; border-radius: 50%; background: var(--fill2); }
  .ob-dots i.on { background: var(--blue); }
  .ob-nav { display: flex; gap: 8px; }
  .ob-nav .btn { flex: 1; padding: 11px; }
  #obNews { margin-top: 16px; border-top: 1px solid var(--line); padding-top: 12px; }
  #obNews h3 { margin: 0 0 2px; font-size: 15px; }
  #obNews .nw-date { font-size: 11.5px; color: var(--ink2); margin-bottom: 8px; }

  #obNews ul { margin: 0; padding-left: 4px; list-style: none; }
  .emptystate { text-align: center; color: var(--ink2); padding: 46px 20px; font-size: 14px; }
  .emptystate .big { font-size: 40px; margin-bottom: 10px; }
</style>
</head>

<script>window.BYGGESAK_CONFIG = window.BYGGESAK_CONFIG || {};</script>
<script src="config.js"></script>
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script src="https://unpkg.com/leaflet.markercluster@1.5.3/dist/leaflet.markercluster.js"></script>
<script>
"use strict";
/* Datalag v3: tynn indeks (data/index.json) + fulle saker per postnummer-chunk
   (data/chunks/<postnr>.json) som lastes ved behov. */
let DATA = { cases: [], updatedLocal: "laster …", poiSummaries: {} };
const TYPE_FULL = { B: "Byggesak", P: "Plansak", H: "Henvendelse", U: "Ulovlighetssak" };
function inflate(e) {
  return {
    id: e.i, casenr: e.c, type: TYPE_FULL[e.t] || e.t, status: e.s,
    displayAddress: e.a || "", postnr: e.p || "0000", nDocs: e.n || 0,
    latlon: e.ll || null, firstDate: e.f || null, lastDate: e.l || null,
    saksbehandler: e.sb || "", soker: e.so || null, journalKey: e.jk || null,
    matrikkel: e.m || "", hasAi: !!e.ai, nyDato: e.ny || null, description: e.d || "",
    kategorier: e.k || [], planfase: e.pf || null,
    url: "https://opengov.360online.com/Cases/KRSANDEBYGG/Case/Details/" + e.i,
  };
}
const CHUNKS = {};
function getChunk(p) {
  if (!CHUNKS[p]) {
    CHUNKS[p] = fetch(`data/chunks/${p}.json`, { cache: "no-cache" })
      .then(r => { if (!r.ok) throw new Error("chunk " + p); return r.json(); })
      .then(d => Object.fromEntries(d.cases.map(x => [x.id, x])))
      .catch(() => ({}));
  }
  return CHUNKS[p];
}
async function loadFull(c) {
  if (c._full) return c._full;
  const chunk = await getChunk(c.postnr);
  c._full = chunk[c.id] || null;
  return c._full;
}
const CFG = window.BYGGESAK_CONFIG || {};           // { apiBase: "https://...workers.dev", pdfProxy: "https://.../pdfproxy" }
const TYPES = ["Byggesak", "Plansak", "Henvendelse", "Ulovlighetssak"];
const TYPE_LABEL = { Byggesak: "Bygg", Plansak: "Plan", Henvendelse: "Henv.", Ulovlighetssak: "Ulovlig" };
const COLORS = { Byggesak: "#0a84ff", Plansak: "#bf5af2", Henvendelse: "#ff9f0a", Ulovlighetssak: "#ff453a" };
const IS_HTTP = /^https?:$/.test(location.protocol);
const IS_LOCAL = ["localhost", "127.0.0.1"].includes(location.hostname);
const state = { types: new Set(TYPES), years: 5, q: "", view: null, bbox: false };
let RENDER_BOUNDS = null;

/* ---------------- Hjelpere ---------------- */
const esc = t => (t || "").replace(/[&<>"]/g, c => ({ "&": "&amp;", "<": "&lt;", ">": "&gt;", '"': "&quot;" }[c]));
const fmtDate = iso => { if (!iso) return ""; const [y, m, d] = iso.split("-"); return `${d}.${m}.${y}`; };
const fmtMonth = iso => {
  if (!iso) return "";
  const mnd = ["jan.", "feb.", "mar.", "apr.", "mai", "jun.", "jul.", "aug.", "sep.", "okt.", "nov.", "des."];
  const [y, m] = iso.split("-");
  return `${mnd[parseInt(m, 10) - 1]} ${y}`;
};
const isoDaysAgo = n => new Date(Date.now() - n * 864e5).toISOString().slice(0, 10);
function caseYear(c) {
  if (c.lastDate) return parseInt(c.lastDate.slice(0, 4), 10);
  const m = /^[A-ZÆØÅ]+-(\d{2})\//.exec(c.casenr);
  return m ? 2000 + parseInt(m[1], 10) : null;
}
function statusColor(s) {
  s = (s || "").toLowerCase();
  if (/ferdigattest|tillatelse gitt|rammetillatelse|igangsetting|brukstillatelse/.test(s)) return "var(--green)";
  if (/avslag|pålegg|tvangsmulkt|overtredelse|avvist|stoppordre/.test(s)) return "var(--red)";
  if (/under behandling|forhåndsvarsel|venter|politisk/.test(s)) return "var(--orange)";
  return "var(--ink3)";
}
function cleanDocTitle(t, c) {
  t = t.replace(/^[A-ZÆØÅ]+-\d{2}\/\d+-\d+\s*-\s*/, "");
  const addr = (c.displayAddress || "").trim();
  if (addr) {
    const re = new RegExp("^[-–\\s]*" + addr.replace(/[.*+?^${}()|[\]\\]/g, "\\$&") + "\\s*[-–,]?\\s*", "i");
    t = t.replace(re, "");
  }
  t = t.replace(/^[-–\s]*\d{1,3}\/\d+(?:\/\d+)*\s*[-–,]?\s*/, "");
  return t.trim() ? t.trim()[0].toUpperCase() + t.trim().slice(1) : t;
}
function caseDesc(c) {
  const d = (c.description || c.title || "").trim();
  return d ? d[0].toUpperCase() + d.slice(1) : c.title;
}
const addrKey = a => (a || "").toLowerCase().trim();
const docSeqJs = t => { const m = /^[A-ZÆØÅ]+-\d{2}\/\d+-(\d+)/.exec(t || ""); return m ? +m[1] : 0; };
const caseSoker = c => c.soker || null;
function displayAddr(c) {
  if (c.displayAddress) return c.displayAddress;
  return c.matrikkel ? "gnr/bnr " + c.matrikkel : "Ukjent adresse";
}
const caseDocs = c => c.nDocs != null ? c.nDocs : (c.documents || []).length;

/* ---------------- Følge-lagring (saker + adresser) ---------------- */
const store = {
  cases: {
    read() { try { return JSON.parse(localStorage.getItem("bsFollow") || "{}"); } catch { return {}; } },
    write(v) { localStorage.setItem("bsFollow", JSON.stringify(v)); },
  },
  addrs: {
    read() { try { return JSON.parse(localStorage.getItem("bsFollowAddr") || "{}"); } catch { return {}; } },
    write(v) { localStorage.setItem("bsFollowAddr", JSON.stringify(v)); },
  },
  email: {
    get() { return localStorage.getItem("bsEmail") || ""; },
    set(v) { localStorage.setItem("bsEmail", v); },
  },
  notes: {
    read() { try { return JSON.parse(localStorage.getItem("bsNotes") || "{}"); } catch { return {}; } },
    write(v) { localStorage.setItem("bsNotes", JSON.stringify(v)); },
  },
  session: {
    get() { try { return JSON.parse(localStorage.getItem("bsSession") || "null"); } catch { return null; } },
    set(v) { v ? localStorage.setItem("bsSession", JSON.stringify(v)) : localStorage.removeItem("bsSession"); },
  },
  prefs: {
    read() { try { return JSON.parse(localStorage.getItem("bsPrefs") || "{}"); } catch { return {}; } },
    write(v) { localStorage.setItem("bsPrefs", JSON.stringify(v)); },
  },
  ents: {  // fulgte firmaer og saksbehandlere: nøkkel "firma:x" / "sb:x"
    read() { try { return JSON.parse(localStorage.getItem("bsFollowEnt") || "{}"); } catch { return {}; } },
    write(v) { localStorage.setItem("bsFollowEnt", JSON.stringify(v)); },
  },
};

/* ---------------- Firma/saksbehandler-entiteter ---------------- */
const entKey = (kind, name) => kind + ":" + (name || "").toLowerCase().trim();
function entCases(kind, name) {
  const n = (name || "").toLowerCase().trim();
  return DATA.cases.filter(c => kind === "sb"
    ? (c.saksbehandler || "").toLowerCase().trim() === n
    : (caseSoker(c) || "").toLowerCase().trim() === n);
}
function entState(kind, name) {
  const cs = entCases(kind, name);
  return { n: cs.length, lastDate: cs.map(c => c.lastDate || "").sort().pop() || null };
}
function isFollowedEnt(kind, name) { return !!store.ents.read()[entKey(kind, name)]; }
function toggleFollowEnt(kind, name) {
  const f = store.ents.read();
  const k = entKey(kind, name);
  if (f[k]) delete f[k];
  else f[k] = { ...entState(kind, name), label: name, kind };
  store.ents.write(f);
  refreshBadges();
  scheduleSync();
}
function markSeenEnt(kind, name) {
  const f = store.ents.read();
  const k = entKey(kind, name);
  if (f[k]) { f[k] = { ...entState(kind, name), label: name, kind }; store.ents.write(f); refreshBadges(); }
}

/* ---------------- Konto-API og synkronisering ---------------- */
async function api(path, opts = {}) {
  if (!CFG.apiBase) throw new Error("Varslings-API er ikke konfigurert");
  const sess = store.session.get();
  const r = await fetch(CFG.apiBase.replace(/\/$/, "") + path, {
    headers: { "Content-Type": "application/json", ...(sess ? { Authorization: "Bearer " + sess.token } : {}) },
    ...opts,
  });
  if (r.status === 401 && sess && path !== "/verify") { store.session.set(null); renderAccountState(); }
  if (!r.ok) throw new Error((await r.text().catch(() => "")) || ("HTTP " + r.status));
  return r.json();
}
const loggedIn = () => !!store.session.get();
function fireEvent(type, objekt) {
  if (!CFG.apiBase) return;
  try {
    const sess = store.session.get();
    fetch(CFG.apiBase.replace(/\/$/, "") + "/hendelse", {
      method: "POST", keepalive: true,
      headers: { "Content-Type": "application/json", ...(sess ? { Authorization: "Bearer " + sess.token } : {}) },
      body: JSON.stringify({ type, objekt }),
    }).catch(() => {});
  } catch { /* ignorér */ }
}

let syncT;
function scheduleSync() {
  if (!loggedIn()) return;
  clearTimeout(syncT);
  syncT = setTimeout(async () => {
    try {
      const prefs = store.prefs.read();
      const addresses = Object.values(store.addrs.read()).map(a => ({ label: a.label, level: a.level || "alt" }))
        .concat(Object.values(store.ents.read()).map(e => ({ label: (e.kind === "sb" ? "sb:" : "firma:") + e.label, level: "alt" })));
      await api("/me", { method: "PUT", body: JSON.stringify({ addresses, radius: prefs.radius || null, weekly: !!prefs.weekly }) });
      await api("/notes", { method: "PUT", body: JSON.stringify({ notes: store.notes.read() }) });
    } catch (e) { console.warn("Synk feilet:", e.message); }

async function pullAccount() {
  if (!loggedIn()) return;
  try {
    const me = await api("/me");
    const fa = store.addrs.read();
    const fe = store.ents.read();
    for (const a of me.addresses || []) {
      const em = /^(firma|sb):(.+)$/.exec(a.label);
      if (em) {
        const kind = em[1], name = em[2];
        fe[entKey(kind, name)] = { ...(fe[entKey(kind, name)] || entState(kind, name)), label: name, kind };
        continue;
      }
      const k = addrKey(a.label);
      const p = POIS.find(p => addrKey(p.label) === k);
      fa[k] = { ...(fa[k] || (p ? poiState(p) : { n: 0, lastDate: null })), label: a.label, level: a.level || "alt" };
    }
    store.addrs.write(fa);
    store.ents.write(fe);
    const prefs = store.prefs.read();
    prefs.weekly = !!me.weekly;
    if (me.radius) prefs.radius = me.radius;
    store.prefs.write(prefs);
    const serverNotes = await api("/notes");
    const local = store.notes.read();
    for (const [k, v] of Object.entries(serverNotes)) {
      if (!local[k] || (v.updated || "") > (local[k].updated || "")) local[k] = v;
    }
    store.notes.write(local);
    drawRadius();
    render();
  } catch (e) { console.warn("Kunne ikke hente konto:", e.message); }
}

function poiState(p) {

}

function isFollowedAddr(label) { return !!store.addrs.read()[addrKey(label)]; }
function toggleFollowCase(c) {

function markSeenCase(c) {

function markSeenAddr(p) {
  const f = store.addrs.read();
  const k = addrKey(p.label);
  if (f[k]) { f[k] = { ...poiState(p), label: p.label }; store.addrs.write(f); refreshBadges(); }
}
function followUpdates() {
  const out = [];
  const fc = store.cases.read();
  for (const c of DATA.cases) {
    const e = fc[c.casenr];
    if (!e) continue;
    const nDocs = caseDocs(c);
    if (nDocs > (e.docs || 0) || (c.lastDate && e.lastDate && c.lastDate > e.lastDate)) {
      out.push({ kind: "case", c, label: c.displayAddress || c.casenr, newDocs: Math.max(nDocs - (e.docs || 0), 0) });
    }
  }
  const fa = store.addrs.read();
  for (const p of POIS) {
    const e = fa[addrKey(p.label)];
    if (!e) continue;
    const st = poiState(p);
    if (st.n > (e.n || 0) || (st.lastDate && e.lastDate && st.lastDate > e.lastDate)) {
      out.push({ kind: "addr", p, label: p.label, newCases: Math.max(st.n - (e.n || 0), 0) });
    }
  }
  for (const [k, e] of Object.entries(store.ents.read())) {
    const st = entState(e.kind, e.label);
    if (st.n > (e.n || 0) || (st.lastDate && e.lastDate && st.lastDate > e.lastDate)) {
      out.push({ kind: "ent", entKind: e.kind, label: e.label, newCases: Math.max(st.n - (e.n || 0), 0) });
    }
  }
  return out;
}

function buildPois() {
  const m = new Map();
  for (const c of DATA.cases) {
    if (!c.latlon) continue;
    const key = c.latlon[0].toFixed(5) + "," + c.latlon[1].toFixed(5);
    if (!m.has(key)) m.set(key, { latlon: c.latlon, cases: [] });
    m.get(key).cases.push(c);
  }
  for (const p of m.values()) {
    p.cases.sort(byActivity);
    p.label = p.cases[0].displayAddress || p.cases[0].listAddress || displayAddr(p.cases[0]);
  }
  return [...m.values()];
}
let POIS = buildPois();
let NOGEO = DATA.cases.filter(c => !c.latlon);

function caseVisible(c) {
  if (!state.types.has(c.type)) return false;
  if (RENDER_BOUNDS && c.latlon && !RENDER_BOUNDS.contains(c.latlon)) return false;
  if (state.years > 0) {
    const y = caseYear(c);
    if (y && y < new Date().getFullYear() - state.years + 1) return false;
  }
  if (state.q) {
    const hay = ((c.title || "") + " " + c.casenr + " " + (c.displayAddress || "") + " " + (c.status || "") + " " + (c.description || "") + " " + (c.soker || "") + " " + (c.saksbehandler || "") + " " + (c.kategorier || []).join(" ")).toLowerCase();
    if (!hay.includes(state.q)) return false;
  }
  return true;
}
function poiColor(cs) {
  if (cs.some(c => c.type === "Ulovlighetssak")) return COLORS.Ulovlighetssak;
  if (cs.some(c => c.type === "Plansak")) return COLORS.Plansak;
  if (cs.some(c => c.type === "Byggesak")) return COLORS.Byggesak;
  return COLORS.Henvendelse;
}

function render() {
  RENDER_BOUNDS = state.bbox ? map.getBounds() : null;
  cluster.clearLayers();
  const counts = { Byggesak: 0, Henvendelse: 0, Ulovlighetssak: 0 };
  const caseUpd = new Set(), addrUpd = new Set();
  for (const u of followUpdates()) (u.kind === "case" ? caseUpd.add(u.c.casenr) : addrUpd.add(addrKey(u.label)));
  for (const c of DATA.cases) if (caseVisible(c)) counts[c.type]++;
  for (const p of POIS) {
    const vis = p.cases.filter(caseVisible);
    if (!vis.length) continue;
    const size = vis.length > 1 ? 30 : 24;
    const hasNews = vis.some(c => caseUpd.has(c.casenr)) || addrUpd.has(addrKey(p.label));
    const icon = L.divIcon({ className: "", iconSize: [size, size], iconAnchor: [size / 2, size / 2],
      html: `<div class="poi ${hasNews ? "pulse" : ""}" style="position:relative;width:${size}px;height:${size}px;background:${poiColor(vis)}">${vis.length > 1 ? vis.length : ""}</div>` });
    const mk = L.marker(p.latlon, { icon, title: p.label });
    mk.bindTooltip(`<b>${esc(p.label)}</b><br>${vis.length} sak${vis.length > 1 ? "er" : ""}`, { direction: "top", offset: [0, -12] });

}

function caseAppeared(c) {
  return c.firstDate || c.nyDato || null;
}
function caseLastActivity(c) {
  return [c.lastDate, c.nyDato].filter(Boolean).sort().pop() || null;
}
function newsCases(days) {
  const cutoff = isoDaysAgo(days);
  const fresh = [], active = [];
  for (const c of DATA.cases) {
    const appeared = caseAppeared(c);
    const activity = caseLastActivity(c);
    if (appeared && appeared >= cutoff) fresh.push(c);
    else if (activity && activity >= cutoff) active.push(c);
  }
  const byDate = (a, b) => (caseLastActivity(b) || "").localeCompare(caseLastActivity(a) || "");
  return { fresh: fresh.sort(byDate), active: active.sort(byDate) };
}

function poiAi(p) {
  const keys = Object.keys(DATA.poiSummaries || {});
  const label = addrKey(p.label);
  for (const k of keys) if (addrKey(k) === label) return DATA.poiSummaries[k];
  for (const c of p.cases) for (const k of keys) {
    if (addrKey(c.displayAddress) === addrKey(k)) return DATA.poiSummaries[k];
  }
  return null;
}

function renderNews() {

  const dated = DATA.cases.filter(c => c.lastDate).length;
  const hint = withDocs && dated / withDocs < 0.7
    ? `<div class="listnote">⏳ Journaldatoer hentes fortsatt inn (${dated} av ${withDocs} saker datert) – nyeste saker dateres først, og listene under fylles etter hvert som dataene oppdateres.</div>`
    : "";
  let html = hint + `<div class="seg" id="newsSeg" style="margin:6px 0 12px">${seg(1, "Siste døgn", day.fresh.length)}${seg(7, "Siste uke", week.fresh.length)}${seg(30, "Siste 30 dager", newsCases(30).fresh.length)}</div><div id="newsBody"></div>`;
  openPanel("Nye saker", "Nye saker og ny aktivitet i Kristiansand", html);
  const body = document.getElementById("newsBody");
  const draw = days => {
    const { fresh, active } = newsCases(days);
    body.innerHTML =
      `<div class="sectionlabel">Nye saker (${fresh.length})</div>` +
      (fresh.length ? fresh.map(caseCard).join("") : `<div class="listnote">Ingen nye saker i perioden.</div>`) +
      `<div class="sectionlabel">Ny aktivitet i eksisterende saker (${active.length})</div>` +
      (active.length ? active.map(caseCard).join("") : `<div class="listnote">Ingen aktivitet i perioden.</div>`);
    document.querySelectorAll("#newsSeg button").forEach(b =>
      b.className = parseInt(b.dataset.days, 10) === days ? "on" : "");
    wireCards();
  };
  document.querySelectorAll("#newsSeg button").forEach(b =>
    b.addEventListener("click", () => draw(parseInt(b.dataset.days, 10))));
  draw(7);
}

function openNogeo() { navOpen("nogeo", renderNogeo); }
function renderNogeo() {
  openPanel("Uten kartfeste", `${NOGEO.length} saker som ikke kunne plasseres på kartet`, NOGEO.filter(caseVisible).map(caseCard).join(""));

function openEntity(kind, name) { navOpen("ent:" + kind + ":" + name, () => renderEntity(kind, name)); }
function renderEntity(kind, name) {
  const cs = entCases(kind, name).sort(byActivity);
  const followed = isFollowedEnt(kind, name);
  const ico = kind === "sb" ? "👤" : "🏢";
  const label = kind === "sb" ? "saksbehandler" : "søkerfirma";
  let html = `<div class="formbox" style="display:flex;align-items:center;gap:10px">
    <div style="flex:1"><b>${ico} ${esc(name)}</b><div style="font-size:12px;color:var(--ink2)">${cs.length} sak(er) som ${label}</div></div>
    <button class="btn ${followed ? "sec" : ""}" id="entFollowBtn">${followed ? "★ Følger" : "☆ Følg"}</button>
  </div>`;
  html += `<div class="seg" id="entSort" style="margin:0 0 12px">
    <button data-s="ny" class="on">Nyeste først</button>
    <button data-s="gammel">Eldste først</button>
  </div>`;
  html += `<div id="caseList"></div><div class="listnote"><button class="btn sec" id="moreBtn">Vis flere</button></div>`;
  openPanel(name, `${cs.length} sak(er) der ${esc(name)} er ${label}`, html);
  document.getElementById("moreBtn").onclick = listShowMore;
  const drawSorted = dir => {
    const sorted = dir === "gammel" ? [...cs].reverse() : cs;
    LIST_CTX = { cases: sorted, shown: 0 };
    document.getElementById("caseList").innerHTML = "";
    listShowMore();
    document.querySelectorAll("#entSort button").forEach(b => b.classList.toggle("on", b.dataset.s === dir));
    document.getElementById("panelBody").scrollTop = 0;
  };
  document.querySelectorAll("#entSort button").forEach(b => b.addEventListener("click", () => drawSorted(b.dataset.s)));
  drawSorted("ny");
  markSeenEnt(kind, name);
  document.getElementById("entFollowBtn").onclick = () => {
    toggleFollowEnt(kind, name);
    renderEntity(kind, name);
  };
}

function wireEmailBox() {
  const msg = document.getElementById("emailMsg");
  const setMsg = (t, cls) => { if (msg) { msg.textContent = t; msg.className = "formmsg " + (cls || ""); } };

  const pwLoginBtn = document.getElementById("pwLoginBtn");
  if (pwLoginBtn) {
    const doLogin = async () => {
      const email = document.getElementById("emailInput").value.trim().toLowerCase();
      const password = document.getElementById("pwInput").value;
      if (!/^[^@\s]+@[^@\s]+\.[^@\s]+$/.test(email)) return setMsg("Ugyldig e-postadresse.", "err");
      if (!password || password.length < 8) return setMsg("Passordet må ha minst 8 tegn.", "err");
      store.email.set(email);
      if (!CFG.apiBase) return setMsg("Innloggings-APIet er ikke satt opp ennå (se README).", "err");
      try {
        const res = await api("/login-passord", { method: "POST", body: JSON.stringify({ email, password }) });
        store.session.set({ token: res.session, email: res.email, rolle: res.rolle, navn: res.navn || null });
        renderAccountState();
        await pullAccount();
        renderKonto();
        showOnboarding();
      } catch (e) { setMsg("Feil: " + e.message, "err"); }
    };
    pwLoginBtn.onclick = doLogin;
    document.getElementById("pwInput").addEventListener("keydown", e => { if (e.key === "Enter") doLogin(); });
  }

  const loginBtn = document.getElementById("loginBtn");
  if (loginBtn) loginBtn.onclick = async (e) => {
    e.preventDefault();
    const email = document.getElementById("emailInput").value.trim().toLowerCase();
    if (!/^[^@\s]+@[^@\s]+\.[^@\s]+$/.test(email)) return setMsg("Skriv e-postadressen i feltet først.", "err");
    store.email.set(email);
    if (!CFG.apiBase) return setMsg("Lagret lokalt – innlogging aktiveres når APIet er satt opp.", "ok");
    try {
      await api("/login", { method: "POST", body: JSON.stringify({ email }) });
      setMsg("Innloggingslenke sendt! Sjekk e-posten din (gyldig i 15 min).", "ok");
    } catch (e2) { setMsg("Feil: " + e2.message, "err"); }
  };

  const adminBtn = document.getElementById("adminBtn");
  if (adminBtn) adminBtn.onclick = openAdmin;

  const logoutBtn = document.getElementById("logoutBtn");
  if (logoutBtn) logoutBtn.onclick = () => { store.session.set(null); renderAccountState(); renderKonto(); };

  const weeklyChk = document.getElementById("weeklyChk");
  if (weeklyChk) weeklyChk.onchange = () => {
    const p = store.prefs.read(); p.weekly = weeklyChk.checked; store.prefs.write(p);
    scheduleSync(); setMsg(weeklyChk.checked ? "Ukessammendrag aktivert." : "Ukessammendrag skrudd av.", "ok");
  };

  const pushBtn = document.getElementById("pushBtn");
  if (pushBtn) pushBtn.onclick = async () => {
    try {
      if (!CFG.vapidPublicKey) return setMsg("Push krever at VAPID-nøkler er konfigurert (se README).", "err");
      const perm = await Notification.requestPermission();
      if (perm !== "granted") return setMsg("Varsler ble ikke tillatt i nettleseren.", "err");
      const reg = await navigator.serviceWorker.ready;
      const sub = await reg.pushManager.subscribe({
        userVisibleOnly: true,
        applicationServerKey: Uint8Array.from(atob(CFG.vapidPublicKey.replace(/-/g, "+").replace(/_/g, "/")), c => c.charCodeAt(0)),
      });
      await api("/push", { method: "POST", body: JSON.stringify({ subscription: sub.toJSON() }) });
      setMsg("Push-varsler aktivert på denne enheten! 🎉", "ok");
    } catch (e) { setMsg("Push feilet: " + e.message, "err"); }
  };

  const radiusBtn = document.getElementById("radiusBtn");
  if (radiusBtn) radiusBtn.onclick = () => {
    closePanel();
    startRadiusPick();
  };
  const radiusOff = document.getElementById("radiusOff");
  if (radiusOff) radiusOff.onclick = () => {
    const p = store.prefs.read(); delete p.radius; store.prefs.write(p);
    drawRadius(); scheduleSync(); openFollowList();
  };
}

/* ---------------- Områdevarsling (radius) ---------------- */
let radiusCircle = null;
function drawRadius() {
  const r = store.prefs.read().radius;
  if (radiusCircle) { map.removeLayer(radiusCircle); radiusCircle = null; }
  if (r) {
    radiusCircle = L.circle([r.lat, r.lon], { radius: r.m, color: "#0a84ff", weight: 1.5, fillOpacity: 0.07, dashArray: "6 6" });
    radiusCircle.addTo(map);
    radiusCircle.bindTooltip(`Områdevarsling: ${r.m} m`, { direction: "top" });
  }
}
function startRadiusPick() {
  const hint = document.createElement("div");
  hint.className = "toast";
  hint.style.cssText = "position:fixed;top:calc(env(safe-area-inset-top,0px) + 90px);left:50%;transform:translateX(-50%);z-index:3000";
  hint.innerHTML = `<span class="emoji">📍</span><div><div class="t-title">Klikk i kartet</div><div class="t-sub">der du vil ha senteret for områdevarslingen</div></div>`;
  document.body.appendChild(hint);
  map.once("click", e => {
    hint.remove();
    const valg = prompt("Radius i meter (100–5000):", String(store.prefs.read().radius?.m || 300));
    const m = Math.min(Math.max(parseInt(valg, 10) || 300, 50), 5000);
    const p = store.prefs.read();
    p.radius = { lat: e.latlng.lat, lon: e.latlng.lng, m, level: "alt" };
    store.prefs.write(p);
    drawRadius();
    scheduleSync();
    openFollowList();
  });
}

/* ---------------- Sakskort (hode fra indeks, innhold lastes ved åpning) ---------------- */
let _updCache = null;
function caseUpdSet() {
  if (!_updCache || Date.now() - _updCache.t > 1500) {
    _updCache = { t: Date.now(), s: new Set(followUpdates().filter(u => u.kind === "case").map(u => u.c.casenr)) };
  }
  return _updCache.s;
}
function caseCard(c) {
  const caseUpd = caseUpdSet();
  const range = c.firstDate
    ? (fmtMonth(c.firstDate) === fmtMonth(c.lastDate) ? fmtMonth(c.firstDate) : `${fmtMonth(c.firstDate)} – ${fmtMonth(c.lastDate)}`)
    : (caseYear(c) || "");
  const rangeTitle = c.firstDate ? `Første dokument ${fmtDate(c.firstDate)} · siste ${fmtDate(c.lastDate)}` : "Saksår fra saksnummeret – journaldatoer hentes inn";
  return `<div class="case" data-nr="${esc(c.casenr)}">
    <div class="case-head">
      <div class="case-top">
        <span class="statusdot" style="background:${statusColor(c.status)}"></span>
        <span class="status-txt">${esc(c.status)}</span>
        <span class="pill ${c.type}">${c.type}</span>
        ${c.planfase ? `<span class="fase ${esc(c.planfase.replace(/[^A-Za-zÆØÅæøå]/g, ""))}">${esc(c.planfase)}</span>` : ""}
        ${caseUpd.has(c.casenr) ? '<span class="newbadge">NYTT</span>' : ""}
        <span class="case-date" title="${esc(rangeTitle)}">${range}</span>
        <button class="sharebtn" data-share="${esc(c.casenr)}" title="Del lenke til saken">📤</button>
        <button class="followbtn ${isFollowedCase(c.casenr) ? "on" : ""}" data-follow="${esc(c.casenr)}" title="Følg saken">${isFollowedCase(c.casenr) ? "★" : "☆"}</button>
      </div>
      <div class="case-desc">${esc(c.description || displayAddr(c))}</div>
      <div class="case-addr">${esc(displayAddr(c))} · ${esc(c.casenr)}</div>
    </div>
    <div class="case-body"><div class="listnote">Laster saksdetaljer …</div></div>
  </div>`;
}

async function fillCaseBody(card, c) {
  if (card.dataset.filled) return;
  card.dataset.filled = "1";
  const body = card.querySelector(".case-body");
  const full = await loadFull(c);
  if (!full) {
    body.innerHTML = `<div class="listnote">Kunne ikke laste detaljer.</div>
      <a class="extlink" href="${esc(c.url)}" target="_blank" rel="noopener">Åpne i kommunens innsynsløsning ↗</a>`;
    return;
  }
  if (!card.querySelector(".case-desc").textContent.trim() || !c.description) {
    card.querySelector(".case-desc").textContent = caseDesc(full);
  }
  const docs = (full.documents || []).map(d => {
    const files = (d.files || []).map(f =>
      `<a class="filechip" href="${esc(f.url)}" data-name="${esc(f.name)}" onclick="return openFile(this)">📄 ${esc(f.name)}</a>`).join("");
    return `<div class="doc ${d.date ? "dated" : ""}">
      ${d.date ? `<div class="d-date">${fmtDate(d.date)}</div>` : ""}
      <div class="d-title">${esc(cleanDocTitle(d.title, c))}</div>
      <div class="d-meta">${esc(d.type)}${d.from ? " · fra " + esc(d.from) : ""}${d.to ? " · til " + esc(d.to) : ""}</div>
      ${files}</div>`;
  }).join("");
  const summary = full.aiSummary ? (full.aiSummary.text || full.aiSummary) : full.summary;
  body.innerHTML = `
    <div class="summary">${full.aiSummary ? "🧠 " : ""}${esc(summary)}</div>
    <div class="meta">
      ${entChip("firma", c.soker)}${entChip("sb", c.saksbehandler)}
      <div style="margin-top:4px">${(full.documents || []).length} dokument(er)${c.matrikkel ? " · gnr/bnr " + esc(c.matrikkel) : ""}</div>
    </div>
    ${fileGallery(full)}
    ${docs ? `<div class="tl">${docs}</div>` : '<div class="listnote">Ingen offentlig tilgjengelige dokumenter.</div>'}
    ${endringerHtml(full)}
    ${notesHtml(c)}
    <a class="extlink" href="${esc(c.url)}" target="_blank" rel="noopener">Åpne i kommunens innsynsløsning ↗</a>`;
  wireCards();
}
function entChip(kind, name) {
  if (!name) return "";
  const ico = kind === "sb" ? "👤" : "🏢";
  const on = isFollowedEnt(kind, name);
  return `<span class="entchip" data-entkind="${kind}" data-entname="${esc(name)}" title="Vis alle saker for ${esc(name)}">
    ${ico} ${esc(name)} <span class="entstar ${on ? "on" : ""}">${on ? "★" : "☆"}</span></span>`;
}
function fileGallery(c) {
  const isDrawing = n => /tegning|fasade|snitt|situasjonsplan|situasjonskart|plantegn|kart|foto|bilde|illustrasjon|perspektiv|3d/i.test(n);
  const files = (c.documents || []).flatMap(d => (d.files || []).map(f => ({ ...f, drawing: isDrawing(f.name) })));
  if (!files.length) return "";
  files.sort((a, b) => (b.drawing ? 1 : 0) - (a.drawing ? 1 : 0));
  return `<div class="sectionlabel" style="margin-top:2px">Vedlegg (${files.length})</div>
    <div class="filegal">${files.map(f =>
      `<a class="filechip ${f.drawing ? "tegning" : ""}" href="${esc(f.url)}" data-name="${esc(f.name)}" onclick="return openFile(this)">${f.drawing ? "📐" : "📄"} ${esc(f.name.slice(0, 42))}${f.name.length > 42 ? "…" : ""}</a>`).join("")}
    </div>`;
}
function endringerHtml(c) {
  const e = c.endringer || [];
  if (!e.length) return "";
  return `<div class="sectionlabel" style="margin-top:10px">Endringer oppdaget</div>` +
    e.slice(-6).reverse().map(x =>
      `<div class="endring"><span class="e-date">${fmtDate(x.dato)}</span> ${esc(x.tekst)}</div>`).join("");
}
function notesHtml(c) {
  const n = store.notes.read()[c.casenr];
  return `<div class="sectionlabel" style="margin-top:10px">Mitt notat 🔒</div>
    <div class="notes" data-note="${esc(c.casenr)}">
      <textarea placeholder="Privat notat om saken (lagres ${loggedIn() ? "på kontoen din" : "kun i denne nettleseren"}) …">${esc(n ? n.text : "")}</textarea>
      <div class="n-meta"><span>${n && n.updated ? "Sist lagret " + fmtDate(n.updated.slice(0, 10)) : ""}</span><span class="n-status"></span></div>
    </div>`;
}

function wireCards() {
  document.querySelectorAll("#panelBody .case-head").forEach(h => {
    if (h.dataset.wired) return;
    h.dataset.wired = "1";
    h.addEventListener("click", e => {
      if (e.target.closest(".followbtn") || e.target.closest(".sharebtn")) return;
      const card = h.parentElement;
      card.classList.toggle("open");
      if (card.classList.contains("open")) {
        const c = DATA.cases.find(x => x.casenr === card.dataset.nr);
        if (c) {
          markSeenCase(c);
          fillCaseBody(card, c);
          fireEvent("sak", c.casenr);
          if (c.latlon) {  // zoom helt inn og markér eiendommen
            highlightCase(c);
            const d = map.getCenter().distanceTo(L.latLng(c.latlon));
            if (d > 40 || map.getZoom() < 18) map.flyTo(c.latlon, 18, { duration: 0.7 });
          }
        }
      }
    });
  });
  document.querySelectorAll("#panelBody .entchip").forEach(ch => {
    if (ch.dataset.wired) return;
    ch.dataset.wired = "1";
    ch.addEventListener("click", e => {
      const kind = ch.dataset.entkind, name = ch.dataset.entname;
      if (e.target.closest(".entstar")) {
        toggleFollowEnt(kind, name);
        const star = ch.querySelector(".entstar");
        const on = isFollowedEnt(kind, name);
        star.textContent = on ? "★" : "☆";
        star.classList.toggle("on", on);
        return;
      }
      openEntity(kind, name);
    });
  });
  document.querySelectorAll("#panelBody .sharebtn").forEach(b => {
    if (b.dataset.wiredS) return;
    b.dataset.wiredS = "1";
    b.addEventListener("click", () => {
      const c = DATA.cases.find(x => x.casenr === b.dataset.share);
      shareLink("sak=" + encodeURIComponent(b.dataset.share), c ? `${c.displayAddress} – ${c.casenr}` : b.dataset.share);
    });
  });
  document.querySelectorAll("#panelBody .followbtn").forEach(b => {
    if (b.dataset.wired) return;
    b.dataset.wired = "1";
    b.addEventListener("click", () => {
      const c = DATA.cases.find(x => x.casenr === b.dataset.follow);
      if (!c) return;
      toggleFollowCase(c);
      b.classList.toggle("on");
      b.textContent = b.classList.contains("on") ? "★" : "☆";
      render();
    });
  });
  document.querySelectorAll("#panelBody .notes textarea").forEach(t => {
    if (t.dataset.wired) return;
    t.dataset.wired = "1";
    let nT;
    t.addEventListener("input", () => {
      clearTimeout(nT);
      const box = t.closest(".notes");
      box.querySelector(".n-status").textContent = "…";
      nT = setTimeout(() => {
        const notes = store.notes.read();
        const nr = box.dataset.note;
        if (t.value.trim()) notes[nr] = { text: t.value, updated: new Date().toISOString() };
        else delete notes[nr];
        store.notes.write(notes);
        scheduleSync();
        box.querySelector(".n-status").textContent = "Lagret ✓";
      }, 600);
    });
  });
}

/* ---------------- Reguleringsoversikt ---------------- */
const BANNER_CACHE = new Map();
function pickBannerFile(full) {
  const files = (full.documents || []).flatMap(d => d.files || []);
  const score = f => {
    const n = f.name.toLowerCase();
    if (/illustrasjon|visualiser|perspektiv|3d|fasade/.test(n)) return 5;
    if (/plankart|situasjonsplan|situasjonskart|kartutsnitt/.test(n)) return 4;
    if (/planbeskrivelse|snitt|oversikt/.test(n)) return 2;
    return 1;
  };
  return files.sort((a, b) => score(b) - score(a))[0] || null;
}
async function renderPlanBanner(el, c) {
  if (BANNER_CACHE.has(c.id)) {
    const url = BANNER_CACHE.get(c.id);
    if (url) el.innerHTML = `<img src="${url}" alt="">` + el.querySelector(".fase")?.outerHTML || "";
    return;
  }
  try {
    const full = await loadFull(c);
    const f = full && pickBannerFile(full);
    const proxied = f && proxyUrl(f.url);
    if (!proxied) { BANNER_CACHE.set(c.id, null); return; }
    const pdfjs = await loadPdfJs();
    const pdf = await pdfjs.getDocument({ url: proxied }).promise;
    const page = await pdf.getPage(1);
    const base = page.getViewport({ scale: 1 });
    const scale = 480 / base.width;
    const vp = page.getViewport({ scale });
    const canvas = document.createElement("canvas");
    canvas.width = vp.width; canvas.height = vp.height;
    await page.render({ canvasContext: canvas.getContext("2d"), viewport: vp }).promise;
    const url = canvas.toDataURL("image/jpeg", 0.7);
    BANNER_CACHE.set(c.id, url);
    const badge = el.querySelector(".fase");
    el.innerHTML = `<img src="${url}" alt="">` + (badge ? badge.outerHTML : "");
  } catch { BANNER_CACHE.set(c.id, null); }
}
let bannerQueue = Promise.resolve();
function queueBanner(el, c) {
  bannerQueue = bannerQueue.then(() => renderPlanBanner(el, c)).catch(() => {});
}

function planCard(c) {
  const faseCls = c.planfase ? esc(c.planfase.replace(/[^A-Za-zÆØÅæøå]/g, "")) : "";
  return `<div class="plancard" data-plan="${esc(c.id)}">
    <div class="planbanner" data-banner="${esc(c.id)}">
      <span class="ph">📐</span>
      ${c.planfase ? `<span class="fase ${faseCls}">${esc(c.planfase)}</span>` : ""}
    </div>
    ${caseCard(c)}
  </div>`;
}

function effDate(c) { return c.lastDate || c.firstDate || String(caseYear(c) || ""); }
function caseRecency(c) { const m = /^[A-ZÆØÅ]+-(\d{2})\/(\d+)/.exec(c.casenr); return m ? (+m[1]) * 100000 + (+m[2]) : 0; }
const byActivity = (a, b) => effDate(b).localeCompare(effDate(a)) || (caseRecency(b) - caseRecency(a));

/* ---------------- Statistikk ---------------- */
function median(arr) {
  if (!arr.length) return null;
  const s = [...arr].sort((a, b) => a - b);
  const m = Math.floor(s.length / 2);
  return s.length % 2 ? s[m] : Math.round((s[m - 1] + s[m]) / 2);
}
function barList(rows, color) {
  const max = Math.max(...rows.map(r => r.v), 1);
  return `<div class="bars">` + rows.map(r => `
    <div class="barrow" title="${esc(r.k)}: ${r.v}">
      <div class="b-lbl">${esc(r.k)}</div>
      <div class="b-track"><div class="b-fill" style="width:${Math.round(r.v / max * 100)}%;background:${r.c || color}"></div></div>
      <div class="b-val">${r.v}</div>
    </div>`).join("") + `</div>`;
}
function openStats() { navOpen("statistikk", renderStats); }
function renderStats() {
  const now = new Date();
  const yr = now.getFullYear();
  const cutoff12 = new Date(now - 365 * 864e5).toISOString().slice(0, 10);
  const cs = DATA.cases;

  const last12 = cs.filter(c => (c.firstDate || "") >= cutoff12);
  const decided = cs.filter(c => /tillatelse gitt|rammetillatelse|igangsetting|avslag|ferdigattest/i.test(c.status || ""));
  const granted = decided.filter(c => !/avslag/i.test(c.status)).length;
  const rejected = decided.length - granted;
  const durations = cs.filter(c => c.firstDate && c.lastDate && /ferdigattest|tillatelse gitt|avslag|avsluttet/i.test(c.status || ""))
    .map(c => Math.round((new Date(c.lastDate) - new Date(c.firstDate)) / 864e5)).filter(d => d >= 0);
  const aktiveUlov = cs.filter(c => c.type === "Ulovlighetssak" && !/avsluttet|trukket|avvist/i.test(c.status || "")).length;

  const perYear = [];
  for (let y = yr - 7; y <= yr; y++) {
    const n = cs.filter(c => caseYear(c) === y).length;
    perYear.push({ k: String(y), v: n });
  }
  const perType = TYPES.map(t => ({ k: t, v: cs.filter(c => c.type === t).length, c: COLORS[t] }));
  const streetCount = {};
  for (const c of cs) {
    if ((c.lastDate || "") < cutoff12) continue;
    const street = (c.displayAddress || "").replace(/\s+\d+[A-Za-zæøå]?$/, "").trim();
    if (street) streetCount[street] = (streetCount[street] || 0) + 1;
  }
  const topStreets = Object.entries(streetCount).sort((a, b) => b[1] - a[1]).slice(0, 8)
    .map(([k, v]) => ({ k, v }));
  const statusCount = {};
  for (const c of cs) statusCount[c.status || "?"] = (statusCount[c.status || "?"] || 0) + 1;
  const topStatus = Object.entries(statusCount).sort((a, b) => b[1] - a[1]).slice(0, 7)
    .map(([k, v]) => ({ k, v }));
  const katCount = {};
  for (const c of cs) for (const k of (c.kategorier || [])) katCount[k] = (katCount[k] || 0) + 1;
  const topKat = Object.entries(katCount).sort((a, b) => b[1] - a[1]).slice(0, 10).map(([k, v]) => ({ k, v }));
  const firmCount = {}, sbCount = {};
  for (const c of cs) {
    const f = caseSoker(c);
    if (f) firmCount[f] = (firmCount[f] || 0) + 1;
    if (c.saksbehandler) sbCount[c.saksbehandler] = (sbCount[c.saksbehandler] || 0) + 1;
  }
  const topFirms = Object.entries(firmCount).sort((a, b) => b[1] - a[1]).slice(0, 8).map(([k, v]) => ({ k, v }));
  const topSb = Object.entries(sbCount).sort((a, b) => b[1] - a[1]).slice(0, 8).map(([k, v]) => ({ k, v }));

  const html = `
    <div class="kpis">
      <div class="kpi" data-kpi="nye12" style="cursor:pointer"><div class="k-val">${last12.length}</div><div class="k-lbl">nye saker siste 12 måneder</div></div>
      <div class="kpi" data-kpi="varighet" style="cursor:pointer"><div class="k-val">${median(durations) ?? "–"}</div><div class="k-lbl">median dager fra første til siste dokument (avgjorte saker)</div></div>
      <div class="kpi" data-kpi="avslag" style="cursor:pointer"><div class="k-val">${decided.length ? Math.round(granted / decided.length * 100) + "%" : "–"}</div><div class="k-lbl">innvilget av avgjorte søknader (${granted} av ${decided.length}, ${rejected} avslag – klikk for avslagene)</div></div>
      <div class="kpi" data-kpi="ulov" style="cursor:pointer"><div class="k-val">${aktiveUlov}</div><div class="k-lbl">åpne ulovlighetssaker</div></div>
    </div>
    <div class="listnote">Alt er klikkbart – trykk på et tall eller en rad for å se sakene bak.</div>
    <div class="sectionlabel">Saker per år</div><div data-list="år">${barList(perYear, "#0a84ff")}</div>
    <div class="sectionlabel">Sakstyper (alle år)</div><div data-list="type">${barList(perType)}</div>
    <div class="sectionlabel">Tiltakstyper (alle år)</div><div data-list="kat">${topKat.length ? barList(topKat, "#ff9f0a") : '<div class="listnote">Klassifisering kjøres etter datainnhentingen.</div>'}</div>
    <div class="sectionlabel">Mest aktive gater siste 12 mnd</div><div data-list="gate">${topStreets.length ? barList(topStreets, "#0a84ff") : '<div class="listnote">Ingen data ennå.</div>'}</div>
    <div class="sectionlabel">Mest aktive søkerfirma</div>
    <div data-entlist="firma">${topFirms.length ? barList(topFirms, "#bf5af2") : '<div class="listnote">Ingen firmadata funnet.</div>'}</div>
    <div class="sectionlabel">Saksbehandlere med flest saker</div>
    <div data-entlist="sb">${topSb.length ? barList(topSb, "#30d158") : '<div class="listnote">Ingen data.</div>'}</div>
    <div class="sectionlabel">Statusfordeling</div><div data-list="status">${barList(topStatus, "#8e8e93")}</div>
    <div class="listnote">Basert på ${cs.length} saker fra kommunens innsynsløsning. Datoer = journalført dato.</div>`;
  openPanel("Statistikk", "Alle saker i kartet – Kristiansand", html);

  const lists = {
    "år": lbl => [`Saker i ${lbl}`, cs.filter(c => String(caseYear(c)) === lbl)],
    "type": lbl => [lbl, cs.filter(c => c.type === lbl)],
    "kat": lbl => [`Tiltakstype: ${lbl}`, cs.filter(c => (c.kategorier || []).includes(lbl))],
    "gate": lbl => [`${lbl} – aktivitet siste 12 mnd`, cs.filter(c =>
      (c.lastDate || "") >= cutoff12 && (c.displayAddress || "").replace(/\s+\d+[A-Za-zæøå]?$/, "").trim() === lbl)],
    "status": lbl => [`Status: ${lbl}`, cs.filter(c => c.status === lbl)],
  };
  document.querySelectorAll('#panelBody [data-list]').forEach(box => {
    const kind = box.dataset.list;
    box.querySelectorAll(".barrow").forEach(r => {
      r.style.cursor = "pointer";
      r.addEventListener("click", () => {
        const [title, cases] = lists[kind](r.querySelector(".b-lbl").textContent);
        openCaseList(title, "", cases.sort(byActivity));
      });
    });
  });
  document.querySelectorAll('#panelBody [data-entlist]').forEach(box => {
    const kind = box.dataset.entlist;
    box.querySelectorAll(".barrow").forEach(r => {
      r.style.cursor = "pointer";
      r.addEventListener("click", () => openEntity(kind, r.querySelector(".b-lbl").textContent));
    });
  });
  document.querySelectorAll('#panelBody [data-kpi]').forEach(k => {
    k.addEventListener("click", () => {
      const kind = k.dataset.kpi;
      if (kind === "nye12") openCaseList("Nye saker siste 12 måneder", "", [...last12].sort(byActivity));
      else if (kind === "varighet") openCaseList("Avgjorte saker med datoer", "grunnlaget for median-tallet",
        cs.filter(c => c.firstDate && c.lastDate && /ferdigattest|tillatelse gitt|avslag|avsluttet/i.test(c.status || "")).sort(byActivity));
      else if (kind === "avslag") openCaseList("Avslag", "", cs.filter(c => /avslag/i.test(c.status || "")).sort(byActivity));
      else if (kind === "ulov") openCaseList("Åpne ulovlighetssaker", "",
        cs.filter(c => c.type === "Ulovlighetssak" && !/avsluttet|trukket|avvist/i.test(c.status || "")).sort(byActivity));
    });
  });
}

    s.steps.map(([svg, t, d]) => `<div class="ob-step"><div class="ob-ico">${svg}</div><div><b>${t}</b><span>${d}</span></div></div>`).join("");
  document.getElementById("obDots").innerHTML = OB_SLIDES.map((_, i) => `<i class="${i === obIdx ? "on" : ""}"></i>`).join("");
  document.getElementById("obNext").textContent = obIdx < OB_SLIDES.length - 1 ? "Neste" : "Ferdig – ta meg til kartet";
}
function closeOnboarding() {
  localStorage.setItem("bsOnboarded", "1");
  sessionStorage.setItem("bsWelcomed", "1");

}
document.getElementById("obSkip").onclick = closeOnboarding;
