# Cloudflare Worker-konfig for Byggesaker Kristiansand.
#
# Oppsett (engangs, ~10 min):
#   1. npm install -g wrangler && wrangler login
#   2. wrangler d1 create byggesak            -> lim inn database_id under
#   3. wrangler d1 execute byggesak --file=schema.sql --remote
#   4. wrangler secret put API_SECRET         (lang tilfeldig streng, samme som GitHub Secret VARSLER_API_SECRET)
#      wrangler secret put RESEND_API_KEY     (fra resend.com)
#   5. Juster FROM_ADDR/SITE_URL/ADMIN_EPOST under, og: wrangler deploy
#   6. Legg worker-URLen inn i config.js (apiBase + pdfProxy) i repoet.

name = "byggesak-api"
main = "varsler-worker.js"
compatibility_date = "2026-06-01"

[[d1_databases]]
binding = "DB"
database_name = "byggesak"
database_id = "SETT-INN-ID-FRA-STEG-2"

[vars]
FROM_ADDR = "Byggesaker Kristiansand <varsel@vizbo.no>"
SITE_URL = "https://perovelo.github.io/byggesak/"
ADMIN_EPOST = "konto@vizbo.no"
